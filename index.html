<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O-Level 27 App</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#0b1d3a,#102a54);
  color:white;
}

.container{
  text-align:center;
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:16px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
  margin-bottom:10px;
}

p{
  opacity:0.8;
  margin-bottom:30px;
}

button{
  padding:14px 28px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#5ca9ff,#6bd3ff);
  color:#001a33;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="container">
<h1>O-Level 27</h1>
<p>Smart Student Dashboard</p>

<button onclick="openApp()">Open App</button>
</div>

<script>
function openApp(){
  window.location.href = "https://showmik007.github.io/App-development-/version7/";
}
</script>

</body>
</html>
