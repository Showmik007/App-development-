<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin App</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="content-body">
<div class="page slim">
  <div class="card card-pad" id="loginBox">
    <div class="badge">Admin login</div>
    <h1 style="margin:14px 0 8px" id="adminAppTitle">Admin App</h1>
    <div class="form-gap">
      <input class="input" id="auser" placeholder="Admin username">
      <input class="input" id="apass" type="password" placeholder="Admin password">
      <button class="btn btn-primary btn-block" id="loginBtn">Login</button>
      <div class="msg" id="loginMsg"></div>
    </div>
  </div>

  <div id="panel" style="display:none">
    <div class="card card-pad" style="margin-bottom:16px">
      <div class="helper-row">
        <div>
          <div class="badge">Admin panel</div>
          <div class="subtext" style="margin-top:10px">Manage users from one screen.</div>
        </div>
        <button class="btn btn-danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="card card-pad" style="margin-bottom:16px">
      <h3 style="margin-top:0">Create user</h3>
      <div class="form-gap">
        <input class="input" id="newId" placeholder="User ID">
        <input class="input" id="newUser" placeholder="Username">
        <input class="input" id="newPass" placeholder="Initial password">
        <button class="btn btn-primary btn-block" id="createBtn">Create</button>
        <div class="msg" id="createMsg"></div>
      </div>
    </div>

    <div class="card card-pad" style="margin-bottom:16px">
      <h3 style="margin-top:0">Reset password</h3>
      <div class="form-gap">
        <input class="input" id="resetId" placeholder="User ID">
        <input class="input" id="resetPass" placeholder="New password">
        <button class="btn btn-primary btn-block" id="resetBtn">Reset</button>
        <div class="msg" id="resetMsg"></div>
      </div>
    </div>

    <div class="card card-pad">
      <div class="helper-row"><h3 style="margin:0">Users</h3><button class="btn" id="refreshBtn">Refresh</button></div>
      <div class="table-wrap"><table class="table"><thead><tr><th>User ID</th><th>Username</th><th>Active</th><th>Created</th><th>Last Login</th></tr></thead><tbody id="tbody"></tbody></table></div>
      <div class="msg" id="tableMsg"></div>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
document.title = (APP.cfg.PAGE_TITLES && APP.cfg.PAGE_TITLES.ADMIN) || APP.cfg.ADMIN_APP_TITLE || 'Admin App';
const $ = id => document.getElementById(id);
document.getElementById('adminAppTitle').textContent = APP.cfg.ADMIN_APP_TITLE || 'Admin App';
function setMsg(id,text,cls){ $(id).className = 'msg' + (cls ? ' ' + cls : ''); $(id).textContent = text || ''; }
async function openPanel(){ $('loginBox').style.display='none'; $('panel').style.display='block'; await loadUsers(); }
async function loadUsers(){
  setMsg('tableMsg','Loading users...');
  try {
    const r = await APP.apiGet({ action:'admin_list_users', token: APP.getToken('ADMIN') });
    if(!r.ok) throw new Error(r.error || 'Failed');
    $('tbody').innerHTML = (r.users || []).map(u => '<tr><td>' + APP.escapeHtml(u.userId) + '</td><td>' + APP.escapeHtml(u.username) + '</td><td>' + (u.isActive ? 'TRUE' : 'FALSE') + '</td><td>' + APP.escapeHtml(u.createdAt || '') + '</td><td>' + APP.escapeHtml(u.lastLoginAt || '') + '</td></tr>').join('');
    setMsg('tableMsg','Loaded ' + ((r.users || []).length) + ' users','ok');
  } catch (err) { setMsg('tableMsg', err.message || 'Failed', 'bad'); }
}
$('loginBtn').addEventListener('click', async function(){
  setMsg('loginMsg','Logging in...');
  try {
    const r = await APP.apiPost({ action:'admin_login', username:$('auser').value, password:$('apass').value });
    if(!r.ok) throw new Error(r.error || 'Failed');
    APP.setToken('ADMIN', r.token); openPanel();
  } catch (err) { setMsg('loginMsg', err.message || 'Failed', 'bad'); }
});
$('logoutBtn').addEventListener('click', async function(){ await APP.logout('ADMIN'); location.reload(); });
$('refreshBtn').addEventListener('click', loadUsers);
$('createBtn').addEventListener('click', async function(){
  setMsg('createMsg','Creating...');
  try {
    const r = await APP.apiPost({ action:'admin_create_user', token: APP.getToken('ADMIN'), userId:$('newId').value, username:$('newUser').value, password:$('newPass').value });
    if(!r.ok) throw new Error(r.error || 'Failed');
    setMsg('createMsg','User created','ok'); loadUsers();
  } catch (err) { setMsg('createMsg', err.message || 'Failed', 'bad'); }
});
$('resetBtn').addEventListener('click', async function(){
  setMsg('resetMsg','Resetting...');
  try {
    const r = await APP.apiPost({ action:'admin_reset_password', token: APP.getToken('ADMIN'), userId:$('resetId').value, newPassword:$('resetPass').value });
    if(!r.ok) throw new Error(r.error || 'Failed');
    setMsg('resetMsg','Password reset','ok');
  } catch (err) { setMsg('resetMsg', err.message || 'Failed', 'bad'); }
});
APP.requireAdmin().then(function(me){ if(me) openPanel(); });
</script>
</body>
</html>
