<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Video</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(0,0,0,.72);
      color: #fff;
    }
    .back {
      padding: 8px 12px;
      border: 0;
      border-radius: 10px;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    .video-wrap {
      width: 100vw;
      height: 100vh;
      background: #000;
      padding-top: 48px;
    }
    .video-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div class="top">
    <button class="back" onclick="history.back()">← Back</button>
  </div>

  <div class="video-wrap">
    <iframe
      id="player"
      title="YouTube video player"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin">
    </iframe>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const id = params.get("id") || "";
  const src = params.get("src") || "";

  let finalSrc = "";

  if(id){
    finalSrc = `https://www.youtube-nocookie.com/embed/${encodeURIComponent(id)}?playsinline=1&rel=0`;
  } else if(src){
    finalSrc = src;
  }

  document.getElementById("player").src = finalSrc;
</script>
</body>
</html>
