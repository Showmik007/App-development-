<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>User App</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --panel2:#0f1730;
      --text:#eaf0ff;
      --muted:#a7b2d6;
      --border:rgba(255,255,255,.12);
      --shadow:0 18px 45px rgba(0,0,0,.40);
      --blue:#3b82f6;
      --cyan:#22d3ee;
      --green:#22c55e;
      --red:#ef4444;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      height:100vh;
      overflow:hidden;
    }

    /* Fixed header (small height) */
    header{
      position:fixed;
      top:0; left:0; right:0;
      height:58px;
      z-index:100;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--border);
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 10px;
    }

    .left{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .helloBtn{
      all:unset;
      cursor:pointer;
      font-weight:950;
      font-size:15px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:55vw;
      padding:6px 10px;
      border-radius:12px;
      border:1px solid transparent;
    }
    .helloBtn:hover{
      border-color: var(--border);
      background: color-mix(in srgb, var(--panel2) 70%, transparent);
    }

    .sub{
      font-size:11px;
      color:var(--muted);
      padding-left:10px;
      line-height:1;
    }

    .right{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:nowrap;
    }

    select, button{
      height:38px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background: color-mix(in srgb, var(--panel2) 70%, transparent);
      color:var(--text);
      font-size:14px;
      outline:none;
    }
    select{
      min-width:150px;
      max-width:40vw;
    }

    button{
      cursor:pointer;
      font-weight:950;
    }
    .logout{
      border:0;
      background: var(--red);
      color:#fff;
      padding:0 14px;
    }
    button:active{ transform: translateY(1px); }

    /* Full iframe area */
    .content{
      position:fixed;
      top:58px; left:0; right:0; bottom:0;
    }
    iframe{
      width:100%;
      height:100%;
      border:0;
      background:#fff;
      display:block;
    }

    /* Profile modal */
    .overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
      padding:16px;
    }
    .overlay.open{ display:flex; }

    .modal{
      width:min(520px, 96vw);
      background: color-mix(in srgb, var(--panel) 95%, transparent);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .modalHead{
      padding:14px 14px 10px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .modalTitle{
      font-weight:950;
      font-size:16px;
      margin:0;
    }
    .modalSub{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
    }
    .xbtn{
      width:38px;height:38px;
      border-radius:12px;
      border:1px solid var(--border);
      background: transparent;
      color:var(--text);
      cursor:pointer;
      font-weight:950;
    }

    .modalBody{ padding:14px; }
    .row{ display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
    label{ font-size:12px; color:var(--muted); font-weight:800; }

    input{
      height:40px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--border);
      font-size:14px;
      outline:none;
      background: color-mix(in srgb, var(--panel2) 75%, transparent);
      color:var(--text);
    }
    input:focus{
      border-color: color-mix(in srgb, var(--blue) 55%, var(--border));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--blue) 18%, transparent);
    }

    .help{
      font-size:12px;
      color:var(--muted);
      margin-top:-6px;
      margin-bottom:10px;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:8px;
      flex-wrap:wrap;
    }
    .btn{
      height:40px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background: transparent;
      cursor:pointer;
      font-weight:950;
      color:var(--text);
    }
    .btnPrimary{
      border:0;
      background: linear-gradient(135deg, color-mix(in srgb, var(--blue) 86%, #fff), color-mix(in srgb, var(--cyan) 65%, #fff));
      color:#081023;
    }

    .msg{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      min-height:18px;
    }
    .ok{ color: var(--green); font-weight:950; }
    .bad{ color: var(--red); font-weight:950; }
  </style>
</head>

<body>
  <header>
    <div class="left">
      <button class="helloBtn" id="helloBtn" title="Open profile">Hi, Loading…</button>
      <div class="sub">User App</div>
    </div>

    <div class="right">
      <select id="feature" title="Select feature">
        <option value="home.html">Home</option>
        <option value="feature1.html">Feature 1</option>
        <option value="feature2.html">Feature 2</option>
      </select>
      <button class="logout" id="logoutBtn">Logout</button>
    </div>
  </header>

  <div class="content">
    <iframe id="frame" src="home.html"></iframe>
  </div>

  <!-- Profile modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modalHead">
        <div>
          <div class="modalTitle">Profile</div>
          <div class="modalSub" id="profileSub">Loading…</div>
        </div>
        <button class="xbtn" id="closeModal">✕</button>
      </div>

      <div class="modalBody">
        <div class="row">
          <label>User ID</label>
          <input id="profileUserId" type="text" readonly />
        </div>

        <div class="row">
          <label>Username</label>
          <input id="profileUsername" type="text" readonly />
        </div>

        <hr style="border:none;border-top:1px solid var(--border);margin:14px 0;">

        <div class="row">
          <label>New Password (visible)</label>
          <input id="newPass" type="text" placeholder="Type new password" />
        </div>

        <div class="row">
          <label>Confirm Password (visible)</label>
          <input id="confirmPass" type="text" placeholder="Re-type new password" />
        </div>

        <div class="help">Password is visible (as you requested). Keep privacy when typing.</div>

        <div class="actions">
          <button class="btn" id="cancelBtn">Cancel</button>
          <button class="btn btnPrimary" id="savePassBtn">Save Password</button>
        </div>

        <div class="msg" id="msg"></div>
      </div>
    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwSH8UmHBBvRY8pK8PdWzGsP-BsQfc3hqgPkGwVFoTB0oIyFbLeqA9LWyOSd8iVJtO9/exec";
  const TOKEN_KEY = "USER_TOKEN";

  const getToken = () => localStorage.getItem(TOKEN_KEY) || "";
  const clearToken = () => localStorage.removeItem(TOKEN_KEY);
  const $ = (id) => document.getElementById(id);

  async function apiGet(params){
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(API_URL + "?" + qs, { cache:"no-store" });
    return res.json();
  }

  // Keep current user info
  let ME = { userId:"", username:"" };

  async function guard(){
    const token = getToken();
    if(!token){ location.href="login.html"; return; }

    const r = await apiGet({ action:"me", token });
    if(!r.ok || r.type !== "user"){
      clearToken();
      location.href="login.html";
      return;
    }

    const username = (r.username && String(r.username).trim()) ? String(r.username).trim() : "";
    const userId = (r.principal && String(r.principal).trim()) ? String(r.principal).trim() : "";

    ME = { userId, username };
    $("helloBtn").textContent = "Hi, " + (username || ("User " + userId) || "User");
  }

  // Feature dropdown loads iframe pages
  $("feature").addEventListener("change", (e) => {
    $("frame").src = e.target.value;
  });

  // Logout (GET)
  $("logoutBtn").addEventListener("click", async () => {
    const token = getToken();
    try { await apiGet({ action:"logout", token }); } catch(e) {}
    clearToken();
    location.href="login.html";
  });

  // Profile modal open/close
  const overlay = $("overlay");
  const openModal = () => overlay.classList.add("open");
  const closeModal = () => {
    overlay.classList.remove("open");
    $("msg").textContent = "";
    $("newPass").value = "";
    $("confirmPass").value = "";
  };

  $("helloBtn").addEventListener("click", () => {
    $("profileUserId").value = ME.userId || "";
    $("profileUsername").value = ME.username || "";
    $("profileSub").textContent = ME.username ? `Logged in as ${ME.username}` : "Logged in";
    openModal();
  });

  $("closeModal").addEventListener("click", closeModal);
  $("cancelBtn").addEventListener("click", closeModal);
  overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeModal(); });

  // Save password (GET) - WebView friendly
  $("savePassBtn").addEventListener("click", async () => {
    const p1 = $("newPass").value.trim();
    const p2 = $("confirmPass").value.trim();

    $("msg").className = "msg";
    if(!p1 || !p2){
      $("msg").textContent = "Please fill both password fields.";
      $("msg").classList.add("bad");
      return;
    }
    if(p1.length < 4){
      $("msg").textContent = "Password too short (min 4 characters).";
      $("msg").classList.add("bad");
      return;
    }
    if(p1 !== p2){
      $("msg").textContent = "Passwords do not match.";
      $("msg").classList.add("bad");
      return;
    }

    $("msg").textContent = "Saving…";

    const token = getToken();
    const r = await apiGet({ action:"user_change_password_get", token, newPassword: p1 });

    if(r && r.ok){
      $("msg").textContent = "✅ Password updated successfully.";
      $("msg").classList.add("ok");
      setTimeout(closeModal, 900);
    }else{
      $("msg").textContent = "❌ " + (r.error || "Failed to update password");
      $("msg").classList.add("bad");
    }
  });

  guard();
</script>
</body>
</html>
