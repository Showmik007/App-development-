<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>O-Level 27 Revision Tracker</title>
  <meta name="description" content="A modern revision tracker with topic & subtopic progress, filters, and analytics." />

  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --panel2:#0f1730;
      --text:#e8eefc;
      --muted:#a7b2d6;
      --border:rgba(255,255,255,.10);
      --shadow:0 10px 30px rgba(0,0,0,.35);

      --blue:#3b82f6;
      --green:#22c55e;
      --amber:#f59e0b;
      --red:#ef4444;
      --pink:#ec4899;
      --cyan:#22d3ee;
    }

    /* Light mode override */
    [data-theme="light"]{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --panel2:#ffffff;
      --text:#0c1222;
      --muted:#5c647a;
      --border:rgba(15,23,42,.12);
      --shadow:0 10px 30px rgba(15,23,42,.10);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height:1.4;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(59,130,246,.25), transparent 60%),
        radial-gradient(900px 450px at 100% 0%, rgba(236,72,153,.18), transparent 55%),
        radial-gradient(900px 450px at 70% 110%, rgba(34,197,94,.12), transparent 55%),
        var(--bg);
      color:var(--text);
      padding:20px;
    }

    .wrap{max-width:1100px;margin:0 auto}

    /* Top header */
    header{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(10px);
      background: color-mix(in srgb, var(--bg) 75%, transparent);
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius:18px;
      padding:16px 16px 12px;
      margin-bottom:16px;
      animation: drop .45s ease-out;
    }

    @keyframes drop{
      from{transform:translateY(-10px);opacity:.6}
      to{transform:translateY(0);opacity:1}
    }

    h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .badge{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 85%, transparent);
      color:var(--muted);
    }

    .sub{
      margin:8px 0 12px;
      color:var(--muted);
      font-size:13px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.2fr .8fr .8fr auto auto auto;
      gap:10px;
      align-items:center;
    }

    @media (max-width: 900px){
      .grid{grid-template-columns:1fr 1fr; }
    }

    input, select, button{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      color:var(--text);
      font-size:14px;
      outline:none;
      transition: transform .08s ease, border-color .2s ease, background .2s ease;
    }
    input:focus, select:focus{
      border-color: color-mix(in srgb, var(--blue) 55%, var(--border));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--blue) 18%, transparent);
    }

    button{
      cursor:pointer;
      font-weight:700;
      letter-spacing:.2px;
    }
    button.primary{
      background: linear-gradient(135deg, color-mix(in srgb, var(--blue) 86%, #fff), color-mix(in srgb, var(--cyan) 65%, #fff));
      color:#081023;
      border:0;
    }
    button.ghost{
      background: transparent;
    }
    button:active{transform:translateY(1px)}
    .status{
      grid-column: 1 / -1;
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-top:6px;
    }

    /* Summary cards */
    .summary{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      margin:14px 0 18px;
    }
    @media (max-width: 900px){
      .summary{grid-template-columns:1fr 1fr}
    }

    .card{
      border:1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border-radius:16px;
      padding:14px 14px 12px;
      box-shadow: var(--shadow);
      animation: rise .4s ease both;
    }
    @keyframes rise{
      from{transform:translateY(10px);opacity:0}
      to{transform:translateY(0);opacity:1}
    }
    .k{font-size:12px;color:var(--muted)}
    .v{font-size:18px;font-weight:800;margin-top:4px}
    .hint{font-size:12px;color:var(--muted);margin-top:6px}

    /* Paper title */
    .paperTitle{
      margin:18px 0 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .paperTitle h2{
      margin:0;
      font-size:16px;
      letter-spacing:.2px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background: var(--blue);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--blue) 20%, transparent);
    }

    /* Topic details */
    details.topic{
      border:1px solid var(--border);
      background: color-mix(in srgb, var(--panel2) 92%, transparent);
      border-radius:18px;
      padding:12px 12px 10px;
      margin:10px 0;
      box-shadow: var(--shadow);
      overflow:hidden;
      animation: rise .4s ease both;
    }

    summary.topicSum{
      cursor:pointer;
      list-style:none;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      user-select:none;
    }
    summary::-webkit-details-marker{display:none}

    .tLeft{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }
    .tTitle{
      font-weight:900;
      font-size:15px;
      line-height:1.2;
    }
    .meta{
      color:var(--muted);
      font-weight:600;
      font-size:12px;
    }

    .tRight{
      text-align:right;
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:flex-end;
      min-width:160px;
    }
    .pct{
      font-weight:900;
      font-size:14px;
    }
    .state{
      font-size:12px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 80%, transparent);
    }

    .bar{
      height:10px;
      background: color-mix(in srgb, var(--border) 40%, transparent);
      border-radius:999px;
      overflow:hidden;
      margin-top:10px;
    }
    .bar > span{
      display:block;
      height:100%;
      width:0%;
      background: var(--blue);
      border-radius:999px;
      transition: width 800ms cubic-bezier(.2,.9,.2,1);
    }

    .topicFoot{
      margin-top:8px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
    }

    /* Subtopic */
    details.sub{
      background: color-mix(in srgb, var(--panel) 90%, transparent);
      border:1px solid var(--border);
      border-radius:16px;
      padding:10px;
      margin:10px 0 0;
    }
    summary.subSum{
      cursor:pointer;
      list-style:none;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      font-weight:900;
      user-select:none;
    }
    details.sub > div{animation: fade .25s ease}
    @keyframes fade{from{opacity:.5;transform:translateY(-2px)}to{opacity:1;transform:translateY(0)}}

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--border);
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      background: color-mix(in srgb, var(--panel) 85%, transparent);
    }
    .chip .dot{width:8px;height:8px;box-shadow:none}
    .done{color:var(--green);font-weight:900}
    .todo{color:var(--red);font-weight:900}

    .muted{color:var(--muted)}
    .footerNote{
      margin:22px 0 8px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }

    .empty{
      border:1px dashed var(--border);
      background: color-mix(in srgb, var(--panel) 60%, transparent);
      border-radius:16px;
      padding:18px;
      color:var(--muted);
      text-align:center;
    }
  </style>
</head>

<body data-theme="dark">
  <div class="wrap">
    <header>
      <h1>
        O-Level 27 — Revision Tracker
        <span class="badge">Topic progress = average of subtopic progress</span>
      </h1>
      <div class="sub"> Showmik Sir "Trust me , you can do more that you know "</div>

      <div class="grid">
        <input id="q" placeholder="Search (e.g., 1.2, Hardware, Boolean)" />
        <select id="paperFilter"><option value="all">All Papers</option></select>
        <select id="doneFilter">
          <option value="all">All</option>
          <option value="done">Done (Exam = TRUE)</option>
          <option value="todo">Not done (Exam = FALSE)</option>
        </select>

        <button id="refresh" class="primary" title="Reload from sheet">Refresh</button>
        <button id="toggleAll" class="ghost" title="Expand/collapse all topics">Expand All</button>
        <button id="theme" class="ghost" title="Toggle light/dark">Light</button>

        <div class="status">
          <span id="status">Loading…</span>
          <span class="muted">Tip: Use Search + Filters to quickly find weak areas.</span>
        </div>
      </div>
    </header>

    <section class="summary" id="summary"></section>
    <div id="out"></div>

    <div class="footerNote">
      Built for fast revision • Keep ticking boxes in Google Sheet • Dashboard updates instantly
    </div>
  </div>

<script>
  const SHEET_ID = "1g9ohlYASepRjaZgUEHlKjOq93YMjUKVCJEop_U_eMNo";
  const SHEET_NAME = "Sheet1";
  const JSON_URL = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

  const FIELDS = [
    ["Theory","Theory"],
    ["Past Paper Practice","Past Paper Practice"],
    ["Revision 1","Revision 1"],
    ["Revision 2","Revision 2"],
    ["Final Revision","Final Revision"],
    ["Exam","Exam"]
  ];

  const $ = (id) => document.getElementById(id);
  const toBool = (v)=> String(v ?? "").trim().toUpperCase() === "TRUE";
  const pct = (n)=> Math.max(0, Math.min(100, Math.round(n)));

  function normalize(r){
    const sub = r["Sub Topic"] ?? r["Sub topic"] ?? r["SubTopic"] ?? r["Subtopic"] ?? "";
    return { ...r, "Sub Topic": sub };
  }

  function subtopicProgress(r){
    const t = FIELDS.reduce((a,[k])=> a + (toBool(r[k]) ? 1 : 0), 0);
    return (t/FIELDS.length)*100;
  }

  function groupTopicWise(rows){
    const byPaper = {};
    rows.forEach(r=>{
      const paper = String(r["Paper"]||"").trim() || "Unknown Paper";
      if(!byPaper[paper]) byPaper[paper] = [];
      byPaper[paper].push(r);
    });

    const result = {};
    for(const paper of Object.keys(byPaper).sort()){
      const list = byPaper[paper];
      let currentTopic = null;

      for(const r0 of list){
        const r = normalize(r0);
        const topic = String(r["Topic"]||"").trim();
        const sub = String(r["Sub Topic"]||"").trim();

        const isTopicRow = topic && !sub;
        const isSubRow = !!sub;

        if(isTopicRow){
          currentTopic = { paper, topicTitle: topic, subs: [] };
          if(!result[paper]) result[paper] = [];
          result[paper].push(currentTopic);
          continue;
        }

        if(isSubRow){
          if(!currentTopic){
            currentTopic = { paper, topicTitle: "Topic (missing header row)", subs: [] };
            if(!result[paper]) result[paper] = [];
            result[paper].push(currentTopic);
          }
          const progress = subtopicProgress(r);
          currentTopic.subs.push({
            subTitle: sub,
            done: toBool(r["Exam"]),
            progress,
            checks: Object.fromEntries(FIELDS.map(([k])=>[k,toBool(r[k])]))
          });
        }
      }
    }
    return result;
  }

  function applyFilters(grouped){
    const q = $("q").value.trim().toLowerCase();
    const paper = $("paperFilter").value;
    const done = $("doneFilter").value;

    const out = {};
    for(const p of Object.keys(grouped)){
      if(paper !== "all" && p !== paper) continue;

      const topics = [];
      for(const t of grouped[p]){
        const subs = t.subs.filter(s=>{
          const doneOk = (done==="all") ? true : (done==="done" ? s.done : !s.done);
          const qOk = !q ? true : (`${t.topicTitle} ${s.subTitle}`.toLowerCase().includes(q));
          return doneOk && qOk;
        });

        if(subs.length) topics.push({ ...t, subs });
      }
      if(topics.length) out[p] = topics;
    }
    return out;
  }

  function topicStats(topic){
    const n = topic.subs.length || 1;
    const avg = topic.subs.reduce((a,s)=>a+s.progress,0)/n;
    const doneAll = topic.subs.length ? topic.subs.every(s=>s.done) : false;
    return {avg, doneAll};
  }

  function colorFor(progress){
    return progress>=75 ? "var(--green)"
      : progress>=50 ? "var(--blue)"
      : progress>=20 ? "var(--amber)"
      : "var(--red)";
  }

  function chipHtml(label, ok){
    return `<span class="chip">
      <span class="dot" style="background:${ok ? "var(--green)" : "var(--red)"}"></span>
      <span>${label}</span>
      <span class="${ok ? "done" : "todo"}">${ok ? "DONE" : "NOT DONE"}</span>
    </span>`;
  }

  function computeOverall(grouped){
    let totalSubs = 0, doneSubs = 0, sumProgress = 0;
    let totalTopics = 0, doneTopics = 0;

    for(const paper of Object.keys(grouped)){
      for(const t of grouped[paper]){
        totalTopics++;
        const {avg, doneAll} = topicStats(t);
        if(doneAll) doneTopics++;
        for(const s of t.subs){
          totalSubs++;
          if(s.done) doneSubs++;
          sumProgress += s.progress;
        }
      }
    }
    const avgProgress = totalSubs ? (sumProgress/totalSubs) : 0;
    return { totalSubs, doneSubs, todoSubs: totalSubs-doneSubs, totalTopics, doneTopics, avgProgress };
  }

  function renderSummary(grouped){
    const s = $("summary");
    const o = computeOverall(grouped);

    s.innerHTML = `
      <div class="card">
        <div class="k">Overall Progress</div>
        <div class="v">${pct(o.avgProgress)}%</div>
        <div class="bar"><span style="width:${pct(o.avgProgress)}%;background:${colorFor(o.avgProgress)}"></span></div>
        <div class="hint">Average of all subtopics</div>
      </div>
      <div class="card">
        <div class="k">Subtopics Done</div>
        <div class="v">${o.doneSubs} / ${o.totalSubs}</div>
        <div class="hint">${o.todoSubs} remaining</div>
      </div>
      <div class="card">
        <div class="k">Topics Completed</div>
        <div class="v">${o.doneTopics} / ${o.totalTopics}</div>
        <div class="hint">Done = all subtopics Exam TRUE</div>
      </div>
      <div class="card">
        <div class="k">Quick Goal</div>
        <div class="v">75%+</div>
        <div class="hint">Aim for green bars before exam week</div>
      </div>
    `;

    // Animate bars after paint
    requestAnimationFrame(()=> {
      s.querySelectorAll(".bar > span").forEach(el=>{
        const w = el.style.width;
        el.style.width = "0%";
        el.getBoundingClientRect();
        el.style.width = w;
      });
    });
  }

  function render(grouped){
    const out = $("out");
    out.innerHTML = "";

    const papers = Object.keys(grouped).sort();
    if(!papers.length){
      out.innerHTML = `<div class="empty">No rows match your filters. Try clearing Search or switching filters.</div>`;
      return;
    }

    renderSummary(grouped);

    for(const paper of papers){
      // Paper header stats
      let pSubs=0, pDone=0, pProg=0;
      for(const t of grouped[paper]){
        for(const s of t.subs){ pSubs++; if(s.done) pDone++; pProg += s.progress; }
      }
      const pAvg = pSubs ? (pProg/pSubs) : 0;

      const head = document.createElement("div");
      head.className = "paperTitle";
      head.innerHTML = `
        <h2>${paper}</h2>
        <span class="pill">
          <span class="dot" style="background:${colorFor(pAvg)}"></span>
          ${pct(pAvg)}% avg • ${pDone}/${pSubs} done
        </span>
      `;
      out.appendChild(head);

      for(const topic of grouped[paper]){
        const {avg, doneAll} = topicStats(topic);

        const tDetails = document.createElement("details");
        tDetails.className = "topic";
        tDetails.open = avg < 35;

        tDetails.innerHTML = `
          <summary class="topicSum">
            <div class="tLeft">
              <div class="tTitle">${topic.topicTitle}</div>
              <div class="meta">${topic.subs.length} subtopic(s) • Focus on red/orange first</div>
            </div>
            <div class="tRight">
              <div class="pct">${pct(avg)}%</div>
              <div class="state">${doneAll ? `<span class="done">DONE</span>` : `<span class="todo">NOT DONE</span>`}</div>
            </div>
          </summary>

          <div class="bar"><span style="width:${pct(avg)}%;background:${colorFor(avg)}"></span></div>
          <div class="topicFoot">
            <span>Topic progress = average of subtopics</span>
            <span class="muted">Click to open • Tick progress in sheet</span>
          </div>

          <div class="subs"></div>
        `;

        const subsWrap = tDetails.querySelector(".subs");
        subsWrap.innerHTML = topic.subs.map(s=>{
          const chips = FIELDS.map(([k,label]) => chipHtml(label, s.checks[k])).join("");
          return `
            <details class="sub">
              <summary class="subSum">
                <span>${s.subTitle}</span>
                <span>${pct(s.progress)}% • ${s.done ? `<span class="done">DONE</span>` : `<span class="todo">NOT DONE</span>`}</span>
              </summary>
              <div style="margin-top:8px">
                <div class="bar"><span style="width:${pct(s.progress)}%;background:${colorFor(s.progress)}"></span></div>
                <div class="chips">${chips}</div>
              </div>
            </details>
          `;
        }).join("");

        out.appendChild(tDetails);
      }
    }

    // animate all bars after render
    requestAnimationFrame(()=> {
      document.querySelectorAll(".bar > span").forEach(el=>{
        const w = el.style.width;
        el.style.width = "0%";
        el.getBoundingClientRect();
        el.style.width = w;
      });
    });
  }

  // Expand/collapse all
  let expanded = false;
  function setAll(open){
    document.querySelectorAll("details.topic").forEach(d=> d.open = open);
    expanded = open;
    $("toggleAll").textContent = open ? "Collapse All" : "Expand All";
  }

  // Debounce typing to reduce reload spam
  let tmr = null;
  function debounceLoad(){
    clearTimeout(tmr);
    tmr = setTimeout(load, 250);
  }

  async function load(){
    $("status").textContent = "Loading…";
    try{
      const res = await fetch(JSON_URL, { cache:"no-store" });
      if(!res.ok) throw new Error("Cannot read sheet. Share it publicly + check tab name.");
      const rows = await res.json();

      // Paper filter
      const set = new Set(rows.map(r=>String(r["Paper"]||"").trim()).filter(Boolean));
      const sel = $("paperFilter");
      const cur = sel.value;
      sel.innerHTML = `<option value="all">All Papers</option>` + [...set].sort().map(p=>`<option value="${p}">${p}</option>`).join("");
      if ([...set,"all"].includes(cur)) sel.value = cur;

      const grouped = groupTopicWise(rows);
      const filtered = applyFilters(grouped);
      render(filtered);

      $("status").textContent = "Updated: " + new Date().toLocaleString();
      // keep expand button consistent
      setAll(expanded);
    }catch(e){
      $("status").textContent = "Error: " + e.message;
      $("out").innerHTML = `<div class="empty">Failed to load data. Check sheet sharing + Sheet name.</div>`;
      $("summary").innerHTML = "";
    }
  }

  // Events
  $("refresh").addEventListener("click", load);
  $("q").addEventListener("input", debounceLoad);
  $("paperFilter").addEventListener("change", load);
  $("doneFilter").addEventListener("change", load);
  $("toggleAll").addEventListener("click", ()=> setAll(!expanded));

  // Theme toggle
  $("theme").addEventListener("click", ()=>{
    const body = document.body;
    const now = body.getAttribute("data-theme") === "light" ? "dark" : "light";
    body.setAttribute("data-theme", now);
    $("theme").textContent = now === "light" ? "Dark" : "Light";
  });

  load();
</script>
</body>
</html>
