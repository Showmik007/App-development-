<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Video Player</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="content-body">
<div class="player-shell">
  <div class="card card-pad hero-card">
    <div class="helper-row" style="margin-bottom:12px">
      <div>
        <div class="badge">Tutorial player</div>
        <h1 id="titleText" class="video-player-title" style="margin:10px 0 0;font-size:clamp(20px,5vw,32px);letter-spacing:-.03em">Tutorial Video</h1>
      </div>
      <button class="btn" id="backBtn">Back</button>
    </div>
    <div class="screen-box" id="screenBox">
      <div class="player-frame" id="frameBox"></div>
      <button class="mobile-rotate-close" id="closeRotateBtn" type="button" aria-label="Close rotated view">✕</button>
    </div>
    <div class="player-action-row mobile-video-actions" id="mobileVideoActions">
      <button class="btn player-action-btn" id="rotateBtn" type="button" aria-label="Rotate video to mobile fullscreen view">
        <span class="player-action-icon" aria-hidden="true">↻</span>
        <span id="rotateLabel">Rotate</span>
      </button>
    </div>
    <div class="subtext" id="playerHint" style="margin-top:10px">Rotate opens the video in a mobile fullscreen-style view inside the app.</div>
  </div>
</div>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
const params = new URLSearchParams(location.search);
const rawId = params.get('id') || '';
const id = APP.extractYouTubeId(rawId);
const title = decodeURIComponent(params.get('title') || 'Tutorial Video');
document.getElementById('titleText').textContent = title || 'Tutorial Video';
document.title = title || ((APP.cfg.PAGE_TITLES && APP.cfg.PAGE_TITLES.VIDEO) || 'Video Player');
document.getElementById('backBtn').addEventListener('click', function(){
  try { parent.postMessage({ type: 'navigate', file: APP.cfg.PAGES.FEATURE1 }, '*'); }
  catch (err) { if(document.referrer && history.length > 1) history.back(); else location.href = APP.cfg.PAGES.FEATURE1; }
});
const screenBox = document.getElementById('screenBox');
const frameBox = document.getElementById('frameBox');
const rotateBtn = document.getElementById('rotateBtn');
const closeRotateBtn = document.getElementById('closeRotateBtn');
const rotateLabel = document.getElementById('rotateLabel');
const playerHint = document.getElementById('playerHint');
let isRotated = false;
let stageResizeRaf = 0;

function isMobileView(){
  return window.matchMedia('(max-width: 760px)').matches;
}
function notifyParent(active){
  try { parent.postMessage({ type: 'video-overlay', active: !!active }, '*'); } catch (err) {}
}
function updateStageSize(){
  if(stageResizeRaf) cancelAnimationFrame(stageResizeRaf);
  stageResizeRaf = requestAnimationFrame(function(){
    if(!(isMobileView() && isRotated)){
      frameBox.style.removeProperty('--stage-w');
      frameBox.style.removeProperty('--stage-h');
      frameBox.style.removeProperty('--stage-scale');
      return;
    }
    const vv = window.visualViewport;
    const viewportW = Math.max(240, Math.floor(vv ? vv.width : window.innerWidth || document.documentElement.clientWidth || 240));
    const viewportH = Math.max(240, Math.floor(vv ? vv.height : window.innerHeight || document.documentElement.clientHeight || 240));
    const stageW = viewportH;
    const stageH = Math.max(135, Math.floor(stageW * 9 / 16));
    const fittedScale = Math.min(viewportW / stageH, viewportH / stageW);
    const safeScale = Math.max(0.82, Math.min(1, fittedScale * 0.985));
    frameBox.style.setProperty('--stage-w', stageW + 'px');
    frameBox.style.setProperty('--stage-h', stageH + 'px');
    frameBox.style.setProperty('--stage-scale', safeScale.toFixed(4));
  });
}
function updateLayout(){
  const mobile = isMobileView();
  screenBox.classList.toggle('mobile-rotated', mobile && isRotated);
  frameBox.classList.toggle('mobile-rotated', mobile && isRotated);
  document.body.classList.toggle('video-mobile-overlay-on', mobile && isRotated);
  closeRotateBtn.style.display = mobile && isRotated ? 'inline-flex' : 'none';
  rotateBtn.style.display = mobile ? 'inline-flex' : 'none';
  if(mobile && isRotated){
    rotateLabel.textContent = 'Close rotate';
    playerHint.textContent = 'Rotate view is filling the mobile screen without cropping the top area.';
    notifyParent(true);
  } else {
    rotateLabel.textContent = 'Rotate';
    playerHint.textContent = mobile ? 'Rotate opens the video in a mobile fullscreen-style view inside the app.' : 'Rotate is available only on mobile view.';
    notifyParent(false);
  }
  updateStageSize();
}
function toggleRotate(){
  if(!isMobileView()) return;
  isRotated = !isRotated;
  updateLayout();
}
rotateBtn.addEventListener('click', toggleRotate);
closeRotateBtn.addEventListener('click', function(){ isRotated = false; updateLayout(); });
window.addEventListener('resize', function(){ if(!isMobileView()) isRotated = false; updateLayout(); });
window.addEventListener('orientationchange', function(){ setTimeout(updateLayout, 160); });
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', updateStageSize);
  window.visualViewport.addEventListener('scroll', updateStageSize);
}
window.addEventListener('beforeunload', function(){ notifyParent(false); });

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape' && isRotated){
    isRotated = false;
    updateLayout();
  }
});

if(id){
  const src = 'https://www.youtube-nocookie.com/embed/' + encodeURIComponent(id) + '?autoplay=1&rel=0&modestbranding=1&playsinline=1&controls=1&fs=1&vq=hd1080&hd=1';
  frameBox.innerHTML = '<div class="player-stage"><iframe src="' + src + '" title="' + APP.escapeHtml(title) + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div>';
  updateLayout();
} else {
  rotateBtn.disabled = true;
  frameBox.innerHTML = '<div class="empty-box">Invalid or missing YouTube video ID.</div>';
}
</script>
</body>
</html>
