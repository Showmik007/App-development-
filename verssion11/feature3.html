<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF Notes</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="content-body">
<div class="page"> 
  <div class="tracker-head card card-pad hero-card tracker-head-min">
    <div class="toolbar tracker-mini-bar">
      <div class="badge">PDF notes</div>
    </div>
  </div>

  <div class="search-sticky-wrap">
    <div class="card card-pad sticky-search-card">
      <label class="form-label">Search PDF</label>
      <input class="input" id="searchInput" placeholder="Search title, paper, chapter, or topic...">
    </div>
  </div>

  <div class="controls-wrap">
    <div class="card card-pad hero-card controls-card">
      <div class="filters-grid filters-grid-pdf">
        <div>
          <label class="form-label">Paper</label>
          <select class="select" id="paperSelect"><option value="">All papers</option></select>
        </div>
        <div>
          <label class="form-label">Chapter</label>
          <select class="select" id="chapterSelect"><option value="">All chapters</option></select>
        </div>
        <div>
          <label class="form-label">Sort</label>
          <select class="select" id="sortSelect">
            <option value="title-asc">Title A-Z</option>
            <option value="title-desc">Title Z-A</option>
            <option value="paper-asc">Paper / Chapter</option>
            <option value="paper-desc">Paper / Chapter desc</option>
          </select>
        </div>
        <div>
          <label class="form-label">Reload</label>
          <button class="btn btn-primary btn-block pdf-refresh-btn" id="refreshBtn" aria-label="Reload list" title="Reload list">↻</button>
        </div>
      </div>
      <div class="status-row compact-status"><span id="statusText">Loading PDF notes…</span><span id="countText">0 notes</span></div>
    </div>
  </div>

  <div class="pdf-grid" id="pdfGrid"></div>
</div>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
const $ = id => document.getElementById(id);
const CACHE_KEY = (APP.cfg.PDFS && APP.cfg.PDFS.CACHE_KEY) || 'PDF_CACHE_V8';
const TTL = (APP.cfg.PDFS && APP.cfg.PDFS.CACHE_TTL_MS) || (1000 * 60 * 60 * 12);
const state = { rows: [] };

function postPage(){ try { parent.postMessage({ type: 'set-page', file: 'feature3.html' }, '*'); } catch (err) {} }
function clean(v){ return APP.normalizeText(v).replace(/^"(.*)"$/, '$1'); }
function pick(row, keys){ for(const k of keys){ if(row[k] != null && String(row[k]).trim() !== '') return clean(row[k]); } return ''; }
function chapterNumber(v){ const m = String(v || '').match(/(\d+(?:\.\d+)?)/); return m ? Number(m[1]) : 9999; }
function normalizePdf(row){
  return {
    paper: pick(row, ['paper','Paper']),
    chapter: pick(row, ['chapter','Chapter']),
    topic: pick(row, ['topic','Topic','subtopic','Subtopic']),
    title: pick(row, ['title','Title','name','Name']) || 'Untitled PDF',
    pdfLink: pick(row, ['pdfLink','PDF Link','pdf link','link','Link','url','URL']),
    description: pick(row, ['description','Description','notes','Notes'])
  };
}
function getCache(){ const c = APP.getCache(CACHE_KEY); return c && Array.isArray(c.rows) && Date.now() - Number(c.at || 0) <= TTL ? c : null; }
function unique(values){ return [...new Set(values.filter(Boolean))]; }
function populateFilters(){
  const papers = unique(state.rows.map(r => r.paper));
  const currentPaper = $('paperSelect').value;
  $('paperSelect').innerHTML = '<option value="">All papers</option>' + papers.map(v => '<option value="' + APP.escapeHtml(v) + '">' + APP.escapeHtml(v) + '</option>').join('');
  if(papers.includes(currentPaper)) $('paperSelect').value = currentPaper;
  const filtered = state.rows.filter(r => !$('paperSelect').value || r.paper === $('paperSelect').value);
  const chapters = unique(filtered.map(r => r.chapter)).sort((a,b) => chapterNumber(a) - chapterNumber(b));
  const currentChapter = $('chapterSelect').value;
  $('chapterSelect').innerHTML = '<option value="">All chapters</option>' + chapters.map(v => '<option value="' + APP.escapeHtml(v) + '">' + APP.escapeHtml(v) + '</option>').join('');
  if(chapters.includes(currentChapter)) $('chapterSelect').value = currentChapter;
}
function openPdf(item){
  if(!item.pdfLink){ alert('Missing PDF link in the PDF sheet.'); return; }
  location.href = 'pdf.html?title=' + encodeURIComponent(item.title) + '&paper=' + encodeURIComponent(item.paper) + '&chapter=' + encodeURIComponent(item.chapter) + '&topic=' + encodeURIComponent(item.topic) + '&file=' + encodeURIComponent(item.pdfLink);
}
function render(){
  populateFilters();
  const q = $('searchInput').value.trim().toLowerCase();
  const paper = $('paperSelect').value;
  const chapter = $('chapterSelect').value;
  const sort = $('sortSelect').value;
  let rows = state.rows.filter(r => {
    const hay = [r.title,r.paper,r.chapter,r.topic,r.description].join(' ').toLowerCase();
    return (!paper || r.paper === paper) && (!chapter || r.chapter === chapter) && (!q || hay.includes(q));
  });
  rows.sort((a,b) => {
    if(sort === 'title-desc') return b.title.localeCompare(a.title);
    if(sort === 'paper-asc') return (a.paper + ' ' + chapterNumber(a.chapter)).localeCompare(b.paper + ' ' + chapterNumber(b.chapter), undefined, {numeric:true});
    if(sort === 'paper-desc') return (b.paper + ' ' + chapterNumber(b.chapter)).localeCompare(a.paper + ' ' + chapterNumber(a.chapter), undefined, {numeric:true});
    return a.title.localeCompare(b.title);
  });
  $('countText').textContent = rows.length + (rows.length === 1 ? ' note' : ' notes');
  $('pdfGrid').innerHTML = rows.map((r, idx) =>
    '<button class="card pdf-card open-pdf" data-idx="' + idx + '">' +
      '<div class="pdf-icon-wrap"><div class="pdf-icon">PDF</div><div class="pdf-lines"></div></div>' +
      '<div class="pdf-card-top"><div class="video-title">' + APP.escapeHtml(r.title) + '</div><span class="badge">' + APP.escapeHtml(r.topic || 'Note') + '</span></div>' +
      '<div class="video-desc">' + APP.escapeHtml([r.paper,r.chapter].filter(Boolean).join(' • ') || 'Study note') + '</div>' +
      '<div class="pdf-meta-row"><span>' + APP.escapeHtml(r.description || 'Open to read inside the app.') + '</span><span class="pdf-open-chip">Open</span></div>' +
    '</button>'
  ).join('') || '<div class="card card-pad empty-box">No PDF notes found.</div>';
  document.querySelectorAll('.open-pdf').forEach((btn, idx) => btn.addEventListener('click', () => openPdf(rows[idx])));
}
async function loadPdfs(force){
  $('statusText').textContent = force ? 'Refreshing…' : 'Loading PDF notes…';
  if(!force){
    const cached = getCache();
    if(cached){ state.rows = cached.rows; $('statusText').textContent = 'List ready'; render(); return; }
  }
  try {
    const r = await APP.apiGet({ action:'tracker', token: APP.getToken('USER'), sheet: APP.cfg.SHEETS.PDF || 'PDF' });
    if(!r.ok) throw new Error(r.error || 'Failed to load PDF notes');
    state.rows = (r.rows || []).map(normalizePdf).filter(r => r.title || r.pdfLink);
    APP.setCache(CACHE_KEY, { at: Date.now(), rows: state.rows });
    $('statusText').textContent = 'List ready';
    render();
  } catch (err) {
    $('statusText').textContent = err.message || 'Failed to load PDF notes';
    $('pdfGrid').innerHTML = '<div class="card card-pad empty-box">PDF notes could not be loaded.</div>';
  }
}
$('searchInput').addEventListener('input', render);
$('paperSelect').addEventListener('change', () => { populateFilters(); render(); });
$('chapterSelect').addEventListener('change', render);
$('sortSelect').addEventListener('change', render);
$('refreshBtn').addEventListener('click', () => { localStorage.removeItem(CACHE_KEY); loadPdfs(true); });
postPage();
APP.requireUser().then(me => { if(me) loadPdfs(false); });
</script>
</body>
</html>
