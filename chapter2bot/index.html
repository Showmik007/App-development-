<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computer Science O Level - AI Intro</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#050816;
      --bg2:#0a1024;
      --panel:#0c132b;
      --line:#1c2957;
      --text:#e8eefc;
      --muted:#8ea2d9;
      --user:#2457ff;
      --assistant:#111a39;
      --assistant-line:#22336d;
    }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(91,140,255,.14), transparent 28%),
        radial-gradient(circle at top right, rgba(110,231,255,.08), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      min-height:100vh;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:20px;
    }

    .app{
      background:linear-gradient(180deg, rgba(12,19,43,.96), rgba(8,13,31,.98));
      border:1px solid var(--line);
      border-radius:28px;
      overflow:hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      min-height:88vh;
      display:flex;
      flex-direction:column;
    }

    .header{
      padding:24px 22px 18px;
      border-bottom:1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(91,140,255,.18), rgba(110,231,255,.05)),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    }

    .header h1{
      margin:0 0 8px;
      font-size:28px;
      font-weight:700;
    }

    .header p{
      margin:0;
      color:#b9c6ee;
      line-height:1.55;
      font-size:14px;
    }

    .chat-box{
      flex:1;
      overflow-y:auto;
      padding:20px 18px;
      scroll-behavior:smooth;
    }

    .chat-box::-webkit-scrollbar{
      width:10px;
    }

    .chat-box::-webkit-scrollbar-thumb{
      background:#1d2b5a;
      border-radius:999px;
    }

    .row{
      display:flex;
      margin:14px 0;
      animation:fadeIn .18s ease;
    }

    .row.user{
      justify-content:flex-end;
    }

    .bubble-wrap{
      max-width:84%;
    }

    .bubble{
      padding:14px 16px;
      border-radius:20px;
      line-height:1.62;
      white-space:pre-wrap;
      word-wrap:break-word;
      font-size:15px;
    }

    .row.assistant .bubble{
      background:linear-gradient(180deg, rgba(17,26,57,.98), rgba(13,20,45,.98));
      border:1px solid var(--assistant-line);
      border-top-left-radius:8px;
      color:var(--text);
      box-shadow:0 10px 25px rgba(0,0,0,.22);
    }

    .row.user .bubble{
      background:linear-gradient(135deg, #2457ff, #417dff);
      color:white;
      border-top-right-radius:8px;
      box-shadow:0 10px 25px rgba(36,87,255,.28);
    }

    .time{
      font-size:11px;
      color:var(--muted);
      margin-top:6px;
      padding:0 4px;
    }

    .typing{
      display:inline-flex;
      gap:6px;
      align-items:center;
      min-height:20px;
      padding:4px 0;
    }

    .typing span{
      width:7px;
      height:7px;
      border-radius:50%;
      background:#8ea2d9;
      display:inline-block;
      animation:bounce 1s infinite ease-in-out;
      box-shadow:0 0 8px rgba(142,162,217,.4);
    }

    .typing span:nth-child(2){ animation-delay:.15s; }
    .typing span:nth-child(3){ animation-delay:.30s; }

    .input-area{
      padding:14px;
      border-top:1px solid var(--line);
      background:rgba(7,12,29,.88);
      backdrop-filter: blur(8px);
    }

    .input-row{
      display:flex;
      gap:10px;
      align-items:center;
    }

    input[type="text"]{
      flex:1;
      padding:15px 16px;
      border-radius:18px;
      border:1px solid #213164;
      background:#0b1430;
      color:var(--text);
      font-size:16px;
      outline:none;
      transition:.15s ease;
    }

    input[type="text"]::placeholder{
      color:#7185bc;
    }

    input[type="text"]:focus{
      border-color:#4f79ff;
      box-shadow:0 0 0 4px rgba(79,121,255,.12);
    }

    .send{
      border:none;
      border-radius:18px;
      padding:0 18px;
      height:50px;
      background:linear-gradient(135deg, #4c78ff, #2e5eff);
      color:white;
      font-size:15px;
      cursor:pointer;
      transition:.15s ease;
      box-shadow:0 10px 20px rgba(46,94,255,.25);
    }

    .send:hover{
      transform:translateY(-1px);
      background:linear-gradient(135deg, #5a85ff, #3568ff);
    }

    .loading-screen{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(91,140,255,.12), transparent 30%),
        linear-gradient(180deg, rgba(5,8,22,.96), rgba(10,16,36,.98));
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:10;
      transition:opacity .28s ease, visibility .28s ease;
    }

    .loading-screen.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .loading-card{
      text-align:center;
      padding:28px 30px;
      background:rgba(12,19,43,.88);
      border:1px solid rgba(91,140,255,.18);
      border-radius:24px;
      width:min(360px, calc(100% - 32px));
      box-shadow:0 0 30px rgba(91,140,255,.18);
    }

    .ring{
      width:62px;
      height:62px;
      margin:0 auto 16px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.08);
      border-top-color:#6ee7ff;
      border-right-color:#5b8cff;
      animation:spin 1s linear infinite;
    }

    .loading-card h3{
      margin:0 0 8px;
      font-size:20px;
    }

    .loading-card p{
      margin:0;
      color:#9fb2e2;
      line-height:1.55;
      font-size:14px;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @keyframes bounce{
      0%,80%,100%{ transform:scale(.7); opacity:.45; }
      40%{ transform:scale(1); opacity:1; }
    }

    @keyframes fadeIn{
      from{ opacity:0; transform:translateY(6px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @media (max-width:700px){
      .bubble-wrap{ max-width:92%; }
      .header h1{ font-size:24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app" style="position:relative;">
      <div class="header">
        <h1>Computer Science O Level - AI Intro</h1>
        <p>Ask naturally. Type <b>more</b>, <b>explain</b>, or <b>example</b> to continue the conversation.</p>
      </div>

      <div class="loading-screen" id="loadingScreen">
        <div class="loading-card">
          <div class="ring"></div>
          <h3>Loading</h3>
          <p>Preparing cached data and connecting…</p>
        </div>
      </div>

      <div class="chat-box" id="chatBox"></div>

      <div class="input-area">
        <div class="input-row">
          <input id="userInput" type="text" placeholder="Ask a question..." />
          <button class="send" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost/chapter2bot/api.php";
    const CACHE_KEY = "cs_olevel_ai_intro_cache_v3";

    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const loadingScreen = document.getElementById("loadingScreen");

    let lastTopic = "";
    let lastExplain = "";
    let lastExample = "";
    let lastAnswer = "";
    let typingEl = null;
    let responseCache = loadCache();

    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) {
        return {};
      }
    }

    function saveCache() {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(responseCache));
      } catch (e) {}
    }

    function cacheKey(text) {
      return normalize(text);
    }

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[^a-z0-9\\s-]/g, " ")
        .replace(/\\s+/g, " ")
        .trim();
    }

    function timeNow() {
      const now = new Date();
      let h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, "0");
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12 || 12;
      return h + ":" + m + " " + ampm;
    }

    function hideLoading() {
      loadingScreen.classList.add("hidden");
    }

    function addChatMessage(text, role) {
      const row = document.createElement("div");
      row.className = "row " + role;

      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      const time = document.createElement("div");
      time.className = "time";
      time.textContent = timeNow();

      wrap.appendChild(bubble);
      wrap.appendChild(time);
      row.appendChild(wrap);

      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
      hideTyping();

      const row = document.createElement("div");
      row.className = "row assistant";

      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = "<span></span><span></span><span></span>";

      bubble.appendChild(typing);
      wrap.appendChild(bubble);
      row.appendChild(wrap);

      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
      typingEl = row;
    }

    function hideTyping() {
      if (typingEl) {
        typingEl.remove();
        typingEl = null;
      }
    }

    function typeAssistantMessage(text) {
      hideTyping();

      const row = document.createElement("div");
      row.className = "row assistant";

      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const time = document.createElement("div");
      time.className = "time";

      wrap.appendChild(bubble);
      row.appendChild(wrap);
      chatBox.appendChild(row);

      let i = 0;
      function typing() {
        if (i < text.length) {
          bubble.textContent += text.charAt(i);
          i++;
          chatBox.scrollTop = chatBox.scrollHeight;
          setTimeout(typing, 9);
        } else {
          time.textContent = timeNow();
          wrap.appendChild(time);
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }
      typing();
    }

    function hydrateStateFromData(data) {
      if (data.topic) lastTopic = data.topic;
      if (data.explain) lastExplain = data.explain;
      if (data.example) lastExample = data.example;
      if (data.reply) lastAnswer = data.reply;
    }

    function getSmartFallbackReply() {
      const topicHints = [
        "CPU",
        "ALU",
        "Control Unit",
        "Registers",
        "Buses",
        "Touch screen",
        "Barcode",
        "QR code",
        "Scanner",
        "Sensors",
        "RAM",
        "ROM",
        "SSD",
        "HDD",
        "Cloud storage",
        "IP address",
        "Router"
      ];

      const randomHints = topicHints
        .sort(() => 0.5 - Math.random())
        .slice(0, 4);

      return (
        "I don’t have that in my notes yet.\n\n" +
        "Try asking in a different way, or ask about another topic.\nWhat would you like to ask next?"
      );
    }

    async function testConnection() {
      try {
        await fetch(API_URL);
      } catch (err) {
      } finally {
        setTimeout(hideLoading, 700);
      }
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addChatMessage(text, "user");
      userInput.value = "";

      const t = normalize(text);

      if (["more", "explain", "explain it", "why", "how"].includes(t)) {
        showTyping();
        setTimeout(() => {
          typeAssistantMessage(lastExplain || lastAnswer || "I do not have more details.");
        }, 220);
        return;
      }

      if (["example", "give example"].includes(t)) {
        showTyping();
        setTimeout(() => {
          typeAssistantMessage(lastExample || "No example available.");
        }, 220);
        return;
      }

      const key = cacheKey(text);

      if (responseCache[key]) {
        hydrateStateFromData(responseCache[key]);
        showTyping();
        setTimeout(() => {
          const cachedReply =
            responseCache[key].found === false
              ? getSmartFallbackReply()
              : (responseCache[key].reply || "No reply received.");
          typeAssistantMessage(cachedReply);
        }, 180);
        return;
      }

      showTyping();

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        hydrateStateFromData(data);

        responseCache[key] = data;
        saveCache();

        const finalReply =
          data.found === false
            ? getSmartFallbackReply()
            : (data.reply || "No reply received.");

        typeAssistantMessage(finalReply);
      } catch (error) {
        typeAssistantMessage("Could not connect to the local proxy.");
        console.error(error);
      }
    }

    userInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    typeAssistantMessage("Hello. Ask a question to begin.");
    testConnection();
  </script>
</body>
</html>
