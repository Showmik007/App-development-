<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Data from Google Sheet</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f5f5f5; }
    .status { margin-top: 10px; color: #666; font-size: 14px; }
  </style>
</head>
<body>

  <h2>Live Google Sheet Data</h2>
  <button onclick="loadSheetData()">Refresh Now</button>
  <div class="status" id="status">Loading…</div>

  <table id="dataTable">
    <thead></thead>
    <tbody></tbody>
  </table>

<script>
  // Your sheet:
  const SHEET_ID = "1g9ohlYASepRjaZgUEHlKjOq93YMjUKVCJEop_U_eMNo";
  const SHEET_NAME = "Sheet1";

  const JSON_URL = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

  async function loadSheetData() {
    const status = document.getElementById("status");
    status.textContent = "Loading…";

    try {
      const res = await fetch(JSON_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to fetch sheet data");
      const data = await res.json();

      if (!data || data.length === 0) {
        status.textContent = "No data found. Check: sharing is public + row 1 has headers + correct sheet tab name.";
        renderTable([], []);
        return;
      }

      const columns = Object.keys(data[0]);
      renderTable(columns, data);
      status.textContent = `Last updated: ${new Date().toLocaleString()}`;
    } catch (err) {
      status.textContent = "Error: " + err.message;
    }
  }

  function renderTable(columns, rows) {
    const thead = document.querySelector("#dataTable thead");
    const tbody = document.querySelector("#dataTable tbody");

    thead.innerHTML = "";
    const trHead = document.createElement("tr");
    columns.forEach(col => {
      const th = document.createElement("th");
      th.textContent = col;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);

    tbody.innerHTML = "";
    rows.forEach(row => {
      const tr = document.createElement("tr");
      columns.forEach(col => {
        const td = document.createElement("td");
        td.textContent = row[col] ?? "";
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  loadSheetData();

  // Auto-refresh every 10 seconds
  setInterval(loadSheetData, 10000);
</script>

</body>
</html>
