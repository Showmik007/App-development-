<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tutorial Videos</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --panel2:#0f1730;
      --text:#eaf0ff;
      --muted:#a7b2d6;
      --border:rgba(255,255,255,.12);
      --blue:#3b82f6;
      --cyan:#22d3ee;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:14px;
    }
    .top{
      position:sticky;
      top:0;
      z-index:10;
      background:var(--bg);
      padding-bottom:12px;
    }
    h1{
      margin:0 0 12px;
      font-size:28px;
    }
    .controls{
      display:grid;
      grid-template-columns: 1fr 180px;
      gap:10px;
      margin-bottom:10px;
    }
    @media (max-width:700px){
      .controls{grid-template-columns:1fr}
    }
    input,select{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel2);
      color:var(--text);
      font-size:14px;
      outline:none;
    }
    .status{
      color:var(--muted);
      font-size:12px;
      margin-bottom:10px;
    }
    .list{
      display:grid;
      gap:12px;
    }
    .card{
      display:grid;
      grid-template-columns: 120px 1fr auto;
      gap:14px;
      align-items:center;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      cursor:pointer;
      transition:.18s ease;
    }
    .card:hover{
      transform:translateY(-1px);
      background:#152243;
    }
    @media (max-width:700px){
      .card{
        grid-template-columns:1fr;
      }
    }
    .thumb{
      width:120px;
      height:68px;
      border-radius:12px;
      object-fit:cover;
      background:#0a1020;
      border:1px solid var(--border);
    }
    @media (max-width:700px){
      .thumb{
        width:100%;
        height:180px;
      }
    }
    .title{
      font-size:22px;
      font-weight:900;
      margin:0 0 6px;
    }
    .desc{
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
      margin:0;
    }
    .meta{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      align-self:start;
    }
    .empty{
      margin-top:16px;
      padding:18px;
      border:1px dashed var(--border);
      border-radius:16px;
      color:var(--muted);
      text-align:center;
      background:var(--panel);
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>Tutorial Videos</h1>
    <div class="controls">
      <input id="search" placeholder="Search by title or description" />
      <select id="sort">
        <option value="serial-asc">Sort: Serial ↑</option>
        <option value="serial-desc">Sort: Serial ↓</option>
        <option value="title-asc">Sort: Title A-Z</option>
        <option value="title-desc">Sort: Title Z-A</option>
      </select>
    </div>
    <div class="status" id="status">Loading…</div>
  </div>

  <div class="list" id="list"></div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbwSH8UmHBBvRY8pK8PdWzGsP-BsQfc3hqgPkGwVFoTB0oIyFbLeqA9LWyOSd8iVJtO9/exec";
  const TOKEN = localStorage.getItem("USER_TOKEN") || "";
  let ALL = [];

  function pick(obj, keys){
    for(const k of keys){
      if(obj[k] !== undefined && obj[k] !== null && String(obj[k]).trim() !== "") return String(obj[k]).trim();
    }
    return "";
  }

  function toEmbedUrl(url){
    url = String(url || "").trim();
    if(!url) return "";

    try{
      const u = new URL(url);

      if(u.hostname.includes("youtu.be")){
        const id = u.pathname.replace(/^\/+/,"").split("/")[0];
        return id ? `https://www.youtube.com/embed/${id}` : "";
      }

      if(u.hostname.includes("youtube.com")){
        if(u.pathname === "/watch"){
          const id = u.searchParams.get("v");
          return id ? `https://www.youtube.com/embed/${id}` : "";
        }
        if(u.pathname.startsWith("/embed/")){
          return url;
        }
        if(u.pathname.startsWith("/shorts/")){
          const id = u.pathname.split("/")[2];
          return id ? `https://www.youtube.com/embed/${id}` : "";
        }
      }

      return url;
    } catch {
      return url;
    }
  }

  function getYoutubeThumb(url){
    const embed = toEmbedUrl(url);
    const m = embed.match(/embed\/([^?&/]+)/);
    const id = m ? m[1] : "";
    return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : "";
  }

  function normalizeRow(r){
    const serial = pick(r, ["serial number","serial","Serial Number","Serial"]);
    const title = pick(r, ["title","Title"]);
    const description = pick(r, ["Description","description","desc","Desc"]);
    const videoLink = pick(r, ["vedio link","video link","Video Link","Vedio Link","link","Link"]);

    return {
      serial,
      title,
      description,
      videoLink,
      embedUrl: toEmbedUrl(videoLink),
      thumb: getYoutubeThumb(videoLink)
    };
  }

  async function load(){
    const status = document.getElementById("status");
    const list = document.getElementById("list");

    try{
      const res = await fetch(API + "?action=tutorial_list&token=" + encodeURIComponent(TOKEN), { cache:"no-store" });
      const data = await res.json();

      if(!data.ok) throw new Error(data.error || "Failed to load tutorials");

      ALL = (data.rows || []).map(normalizeRow).filter(r => r.title || r.videoLink);
      status.textContent = `Loaded ${ALL.length} video${ALL.length === 1 ? "" : "s"}`;
      render();
    }catch(e){
      status.textContent = "Error: " + e.message;
      list.innerHTML = `<div class="empty">Could not load videos.</div>`;
    }
  }

  function render(){
    const q = document.getElementById("search").value.trim().toLowerCase();
    const sort = document.getElementById("sort").value;
    const list = document.getElementById("list");
    const status = document.getElementById("status");

    let rows = ALL.filter(r => {
      const hay = `${r.title} ${r.description}`.toLowerCase();
      return !q || hay.includes(q);
    });

    rows.sort((a,b)=>{
      if(sort === "serial-asc") return (parseInt(a.serial || "0",10) || 0) - (parseInt(b.serial || "0",10) || 0);
      if(sort === "serial-desc") return (parseInt(b.serial || "0",10) || 0) - (parseInt(a.serial || "0",10) || 0);
      if(sort === "title-asc") return a.title.localeCompare(b.title);
      if(sort === "title-desc") return b.title.localeCompare(a.title);
      return 0;
    });

    status.textContent = `${rows.length} result${rows.length === 1 ? "" : "s"}`;

    if(!rows.length){
      list.innerHTML = `<div class="empty">No videos found.</div>`;
      return;
    }

    list.innerHTML = rows.map(r => `
      <div class="card" data-url="${encodeURIComponent(r.embedUrl || r.videoLink)}" data-title="${encodeURIComponent(r.title)}">
        <img class="thumb" src="${r.thumb || ""}" alt="" onerror="this.style.display='none'">
        <div>
          <div class="title">${escapeHtml(r.title || "Untitled Video")}</div>
          <p class="desc">${escapeHtml(r.description || "No description")}</p>
        </div>
        <div class="meta">#${escapeHtml(r.serial || "-")}</div>
      </div>
    `).join("");

    document.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", ()=>{
        const url = decodeURIComponent(card.dataset.url || "");
        const title = decodeURIComponent(card.dataset.title || "");
        location.href = `video.html?video=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}`;
      });
    });
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;");
  }

  document.getElementById("search").addEventListener("input", render);
  document.getElementById("sort").addEventListener("change", render);

  load();
</script>
</body>
</html>
