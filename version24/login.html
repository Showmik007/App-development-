<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="content-body">
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="badge">Student login</div>
    <h1 id="appTitle">O-Level 27</h1>
    <div class="subtext" id="subTitle">Enter your User ID and password.</div>
    <div class="form-gap" style="margin-top:18px">
      <div>
        <label class="form-label">User ID</label>
        <input class="input" id="userId" placeholder="e.g. 910" inputmode="numeric">
      </div>
      <div>
        <label class="form-label">Password</label>
        <input class="input" id="password" type="password" placeholder="Your password">
      </div>
      <button class="btn btn-primary btn-block" id="loginBtn">Login</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
document.title = (APP.cfg.PAGE_TITLES && APP.cfg.PAGE_TITLES.LOGIN) || APP.cfg.APP_NAME || 'Login';
const $ = id => document.getElementById(id);
$('appTitle').textContent = APP.cfg.APP_NAME;
$('subTitle').textContent = APP.cfg.USER_APP_SUBTITLE;
function setMsg(text, cls){ $('msg').className = 'msg' + (cls ? ' ' + cls : ''); $('msg').textContent = text || ''; }
async function login(){
  const userId = $('userId').value.trim();
  const password = $('password').value;
  if(!userId || !password) return setMsg('Please enter User ID and password.', 'bad');
  $('loginBtn').disabled = true; setMsg('Logging in…');
  try {
    const r = await APP.apiGet({ action: 'user_login_get', userId: userId, password: password });
    if(!r.ok || !r.token) throw new Error(r.error || 'Invalid credentials');
    APP.setToken('USER', r.token);
    setMsg('Login successful', 'ok');
    setTimeout(function(){ location.href = APP.cfg.PAGES.APP; }, 250);
  } catch (err) { setMsg(err.message || 'Login failed', 'bad'); }
  $('loginBtn').disabled = false;
}
$('loginBtn').addEventListener('click', login);
$('password').addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
$('userId').addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>
