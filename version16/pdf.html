<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>PDF Viewer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="pdf-reader-body">
<div class="pdf-nav-bar" id="pdfNavBar">
  <button class="pdf-reader-back" id="backBtn" type="button">Back</button>
  <div class="pdf-nav-group" id="pageNavGroup">
    <button class="pdf-nav-btn" id="prevBtn" type="button">Prev</button>
    <label class="pdf-page-jump" for="pageInput" id="pageJumpWrap">
      <input id="pageInput" type="number" min="1" value="1" inputmode="numeric" aria-label="Page number">
      <span id="pageTotalText">/ 1</span>
    </label>
    <button class="pdf-nav-btn" id="nextBtn" type="button">Next</button>
  </div>
</div>

<div class="pdf-reader-shell single-page">
  <div class="pdf-reader-status" id="statusText">Loading PDF…</div>
  <div class="pdf-single-wrap" id="canvasWrap">
    <div class="pdf-single-card">
      <canvas class="pdf-page-canvas single" id="pdfCanvas"></canvas>
    </div>
  </div>
  <div class="pdf-embed-wrap" id="embedWrap" hidden>
    <iframe id="embedFrame" class="pdf-embed-frame" title="PDF preview" loading="eager" referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const title = decodeURIComponent(params.get('title') || 'PDF Note');
  const rawPdfUrl = decodeURIComponent(params.get('file') || params.get('url') || '');

  document.title = title || ((APP.cfg.PAGE_TITLES && APP.cfg.PAGE_TITLES.PDF_VIEWER) || 'PDF Viewer');

  const statusEl = document.getElementById('statusText');
  const backBtn = document.getElementById('backBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const pageInput = document.getElementById('pageInput');
  const pageTotalText = document.getElementById('pageTotalText');
  const pageNavGroup = document.getElementById('pageNavGroup');
  const pageJumpWrap = document.getElementById('pageJumpWrap');
  const canvasWrap = document.getElementById('canvasWrap');
  const embedWrap = document.getElementById('embedWrap');
  const embedFrame = document.getElementById('embedFrame');
  const canvas = document.getElementById('pdfCanvas');
  const shell = document.querySelector('.pdf-reader-shell');
  const ctx = canvas.getContext('2d', { alpha:false });

  let pdfDoc = null;
  let pageNum = 1;
  let rendering = false;
  let pendingPage = null;

  backBtn.addEventListener('click', function(){
    try { parent.postMessage({ type: 'navigate', file: APP.cfg.PAGES.PDFS }, '*'); }
    catch (err) { if(document.referrer && history.length > 1) history.back(); else location.href = APP.cfg.PAGES.PDFS; }
  });

  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  document.addEventListener('dragstart', function(e){ e.preventDefault(); });
  document.addEventListener('keydown', function(e){
    const key = String(e.key || '').toLowerCase();
    if((e.ctrlKey || e.metaKey) && (key === 's' || key === 'p' || key === 'u')) {
      e.preventDefault();
      return;
    }
    if(embedWrap.hidden) {
      if(key === 'arrowleft') showPrev();
      if(key === 'arrowright') showNext();
      if(key === 'enter' && document.activeElement === pageInput) jumpToInput();
    }
  });

  function setStatus(msg, isError){
    statusEl.textContent = msg;
    statusEl.classList.toggle('error', !!isError);
  }

  function getDriveFileId(input){
    const raw = String(input || '').trim();
    if(!raw) return '';
    const fileMatch = raw.match(/\/file\/d\/([^\/?#]+)/i);
    if(fileMatch) return fileMatch[1];
    try {
      const u = new URL(raw);
      if(u.hostname.includes('drive.google.com')) return u.searchParams.get('id') || '';
    } catch (err) {}
    return '';
  }

  function buildPdfJsUrl(input){
    const raw = String(input || '').trim();
    if(!raw) return '';
    const driveId = getDriveFileId(raw);
    if(driveId) return 'https://drive.google.com/uc?export=download&id=' + encodeURIComponent(driveId);
    return raw;
  }

  function buildEmbedUrl(input){
    const raw = String(input || '').trim();
    const driveId = getDriveFileId(raw);
    if(driveId) return 'https://drive.google.com/file/d/' + encodeURIComponent(driveId) + '/preview';
    return 'https://docs.google.com/gview?embedded=1&url=' + encodeURIComponent(raw);
  }

  function showEmbedMode(message){
    canvasWrap.hidden = true;
    embedWrap.hidden = false;
    pageNavGroup.classList.add('pdf-nav-disabled');
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    pageInput.disabled = true;
    pageJumpWrap.title = 'Page buttons are unavailable in preview mode';
    embedFrame.src = buildEmbedUrl(rawPdfUrl);
    setStatus(message || 'Preview mode enabled', false);
  }

  function clampPage(n){
    if(!pdfDoc) return 1;
    n = Number(n) || 1;
    return Math.max(1, Math.min(pdfDoc.numPages, n));
  }

  function updateNav(){
    const total = pdfDoc ? pdfDoc.numPages : 1;
    pageInput.value = String(pageNum);
    pageInput.max = String(total);
    pageTotalText.textContent = '/ ' + total;
    prevBtn.disabled = pageNum <= 1;
    nextBtn.disabled = pageNum >= total;
  }

  async function renderPage(num){
    if(!pdfDoc) return;
    rendering = true;
    const safeNum = clampPage(num);
    pageNum = safeNum;
    updateNav();
    setStatus('Rendering page ' + safeNum + ' of ' + pdfDoc.numPages + '…', false);

    try {
      const page = await pdfDoc.getPage(safeNum);
      const cardWidth = Math.max(Math.min(shell.clientWidth - (window.innerWidth <= 760 ? 20 : 40), 980), 260);
      const rawViewport = page.getViewport({ scale: 1 });
      let scale = cardWidth / rawViewport.width;
      if(window.innerWidth <= 760) scale *= 0.97;
      else scale *= 0.94;
      scale = Math.max(0.5, Math.min(scale, 1.35));

      const viewport = page.getViewport({ scale });
      const outputScale = Math.max(window.devicePixelRatio || 1, 1);
      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = Math.floor(viewport.width) + 'px';
      canvas.style.height = Math.floor(viewport.height) + 'px';

      await page.render({
        canvasContext: ctx,
        viewport,
        transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
      }).promise;

      setStatus(title + ' • Page ' + safeNum + ' of ' + pdfDoc.numPages, false);
    } catch (err) {
      console.error(err);
      setStatus('Failed to render PDF page', true);
    }

    rendering = false;
    if(pendingPage !== null){
      const next = pendingPage;
      pendingPage = null;
      renderPage(next);
    }
  }

  function queuePage(num){
    const safeNum = clampPage(num);
    if(rendering) pendingPage = safeNum;
    else renderPage(safeNum);
  }

  function showPrev(){ if(pdfDoc && pageNum > 1) queuePage(pageNum - 1); }
  function showNext(){ if(pdfDoc && pageNum < pdfDoc.numPages) queuePage(pageNum + 1); }
  function jumpToInput(){ if(pdfDoc) queuePage(pageInput.value); }

  prevBtn.addEventListener('click', showPrev);
  nextBtn.addEventListener('click', showNext);
  pageInput.addEventListener('change', jumpToInput);
  pageInput.addEventListener('blur', jumpToInput);

  if(!rawPdfUrl){
    setStatus('Missing PDF file link', true);
    return;
  }

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  async function loadPdf(){
    const pdfUrl = buildPdfJsUrl(rawPdfUrl);
    const isDrive = !!getDriveFileId(rawPdfUrl);
    try {
      setStatus('Loading PDF…', false);
      pdfDoc = await pdfjsLib.getDocument({ url: pdfUrl, withCredentials: false }).promise;
      updateNav();
      queuePage(pageNum);
    } catch (err) {
      console.error(err);
      showEmbedMode(isDrive ? 'Opened in Google Drive preview mode' : 'Opened in preview mode');
    }
  }

  let resizeTimer = null;
  window.addEventListener('resize', function(){
    if(!pdfDoc || !embedWrap.hidden) return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){ queuePage(pageNum); }, 120);
  });

  loadPdf();
})();
</script>
</body>
</html>
