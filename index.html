<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>O‑Level 27 Tracker (Simple + Subtopic Details)</title>
  <style>
    body{font-family:Arial, sans-serif; margin:20px; line-height:1.35}
    h1{margin:0 0 6px}
    .sub{color:#555;margin:0 0 14px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:12px 0}
    input,select,button{padding:8px 10px;font-size:14px}
    button{cursor:pointer}
    .paper{margin:18px 0 6px;font-weight:bold;font-size:18px}
    details.topic{border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px 0;background:#fafafa}
    summary.topicSum{cursor:pointer;font-weight:bold;display:flex;justify-content:space-between;gap:12px;align-items:center}
    .meta{color:#666;font-weight:normal;font-size:13px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{border-bottom:1px solid #eee;padding:8px;text-align:left;vertical-align:top}
    th{font-size:12px;color:#555}
    .bar{height:10px;background:#eee;border-radius:999px;overflow:hidden}
    .bar > span{display:block;height:100%;background:#3b82f6;width:0%}
    .done{color:green;font-weight:bold}
    .todo{color:#b91c1c;font-weight:bold}
    .small{font-size:12px;color:#666}
    details.sub{background:#fff;border:1px solid #eee;border-radius:10px;padding:8px;margin:8px 0}
    summary.subSum{cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:center;font-weight:bold}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .chip{display:inline-flex;align-items:center;gap:8px;border:1px solid #eee;border-radius:999px;padding:6px 10px;font-size:13px}
    .dot{width:10px;height:10px;border-radius:50%}
  </style>
</head>
<body>
  <h1>Class O‑Level 27 — Revision Tracker</h1>
  <p class="sub">Heading done by Showmik Sir • Simple view • Topic progress = average of subtopic progress</p>

  <div class="row">
    <input id="q" placeholder="Search (e.g., 1.2, Hardware, Boolean)" />
    <select id="paperFilter"><option value="all">All Papers</option></select>
    <select id="doneFilter">
      <option value="all">All</option>
      <option value="done">Done (Exam = TRUE)</option>
      <option value="todo">Not done (Exam = FALSE)</option>
    </select>
    <button id="refresh">Refresh</button>
    <span id="status" class="small">Loading…</span>
  </div>

  <div id="out"></div>

<script>
  const SHEET_ID = "1g9ohlYASepRjaZgUEHlKjOq93YMjUKVCJEop_U_eMNo";
  const SHEET_NAME = "Sheet1";
  const JSON_URL = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

  const FIELDS = [
    ["Theory","Theory"],
    ["Past Paper Practice","Past Paper Practice"],
    ["Revision 1","Revision 1"],
    ["Revision 2","Revision 2"],
    ["Final Revision","Final Revision"],
    ["Exam","Exam"]
  ];

  const $ = (id) => document.getElementById(id);
  const toBool = (v)=> String(v ?? "").trim().toUpperCase() === "TRUE";
  const pct = (n)=> Math.max(0, Math.min(100, Math.round(n)));

  function normalize(r){
    const sub = r["Sub Topic"] ?? r["Sub topic"] ?? r["SubTopic"] ?? r["Subtopic"] ?? "";
    return { ...r, "Sub Topic": sub };
  }

  function subtopicProgress(r){
    const t = FIELDS.reduce((a,[k])=> a + (toBool(r[k]) ? 1 : 0), 0);
    return (t/FIELDS.length)*100;
  }

  function groupTopicWise(rows){
    const byPaper = {};
    rows.forEach(r=>{
      const paper = String(r["Paper"]||"").trim() || "Unknown Paper";
      if(!byPaper[paper]) byPaper[paper] = [];
      byPaper[paper].push(r);
    });

    const result = {};
    for(const paper of Object.keys(byPaper).sort()){
      const list = byPaper[paper];
      let currentTopic = null;

      for(const r0 of list){
        const r = normalize(r0);
        const topic = String(r["Topic"]||"").trim();
        const sub = String(r["Sub Topic"]||"").trim();

        const isTopicRow = topic && !sub;
        const isSubRow = !!sub;

        if(isTopicRow){
          currentTopic = { paper, topicTitle: topic, subs: [] };
          if(!result[paper]) result[paper] = [];
          result[paper].push(currentTopic);
          continue;
        }

        if(isSubRow){
          if(!currentTopic){
            currentTopic = { paper, topicTitle: "Topic (missing header row)", subs: [] };
            if(!result[paper]) result[paper] = [];
            result[paper].push(currentTopic);
          }
          const progress = subtopicProgress(r);
          currentTopic.subs.push({
            subTitle: sub,
            done: toBool(r["Exam"]),
            progress,
            checks: Object.fromEntries(FIELDS.map(([k])=>[k,toBool(r[k])])),
            raw: r
          });
        }
      }
    }
    return result;
  }

  function applyFilters(grouped){
    const q = $("q").value.trim().toLowerCase();
    const paper = $("paperFilter").value;
    const done = $("doneFilter").value;

    const out = {};
    for(const p of Object.keys(grouped)){
      if(paper !== "all" && p !== paper) continue;

      const topics = [];
      for(const t of grouped[p]){
        const subs = t.subs.filter(s=>{
          const doneOk = (done==="all") ? true : (done==="done" ? s.done : !s.done);
          const qOk = !q ? true : (`${t.topicTitle} ${s.subTitle}`.toLowerCase().includes(q));
          return doneOk && qOk;
        });

        if(subs.length) topics.push({ ...t, subs });
      }
      if(topics.length) out[p] = topics;
    }
    return out;
  }

  function topicStats(topic){
    const n = topic.subs.length || 1;
    const avg = topic.subs.reduce((a,s)=>a+s.progress,0)/n;
    const doneAll = topic.subs.length ? topic.subs.every(s=>s.done) : false;
    return {avg, doneAll};
  }

  function chipHtml(label, ok){
    return `<span class="chip">
      <span class="dot" style="background:${ok ? "#16a34a" : "#ef4444"}"></span>
      ${label}: <span class="${ok ? "done" : "todo"}">${ok ? "DONE" : "NOT DONE"}</span>
    </span>`;
  }

  function render(grouped){
    const out = $("out");
    out.innerHTML = "";

    const papers = Object.keys(grouped).sort();
    if(!papers.length){
      out.innerHTML = "<p>No rows match your filters.</p>";
      return;
    }

    for(const paper of papers){
      const pDiv = document.createElement("div");
      pDiv.innerHTML = `<div class="paper">${paper}</div>`;
      out.appendChild(pDiv);

      for(const topic of grouped[paper]){
        const {avg, doneAll} = topicStats(topic);

        const tDetails = document.createElement("details");
        tDetails.className = "topic";
        tDetails.open = avg < 35;

        const topicHeader = `
          <summary class="topicSum">
            <span>${topic.topicTitle} <span class="meta">• ${topic.subs.length} subtopic(s)</span></span>
            <span>${pct(avg)}% • <span class="${doneAll ? "done":"todo"}">${doneAll ? "DONE":"NOT DONE"}</span></span>
          </summary>
          <div style="margin-top:8px">
            <div class="bar"><span style="width:${pct(avg)}%"></span></div>
            <div class="small" style="margin-top:6px">Topic progress = average of its subtopics</div>
          </div>
        `;

        const subsHtml = topic.subs.map(s=>{
          const color = s.progress>=75 ? "#16a34a" : s.progress>=50 ? "#3b82f6" : s.progress>=20 ? "#f59e0b" : "#ef4444";
          const chips = FIELDS.map(([k,label]) => chipHtml(label, s.checks[k])).join("");
          return `
            <details class="sub">
              <summary class="subSum">
                <span>${s.subTitle}</span>
                <span>${pct(s.progress)}% • <span class="${s.done ? "done":"todo"}">${s.done ? "DONE" : "NOT DONE"}</span></span>
              </summary>
              <div style="margin-top:8px">
                <div class="bar"><span style="width:${pct(s.progress)}%;background:${color}"></span></div>
                <div class="chips">${chips}</div>
              </div>
            </details>
          `;
        }).join("");

        tDetails.innerHTML = topicHeader + subsHtml;
        out.appendChild(tDetails);
      }
    }
  }

  async function load(){
    $("status").textContent = "Loading…";
    try{
      const res = await fetch(JSON_URL, { cache:"no-store" });
      if(!res.ok) throw new Error("Cannot read sheet. Make sure it is shared publicly and tab name is correct.");
      const rows = await res.json();

      // Paper filter
      const set = new Set(rows.map(r=>String(r["Paper"]||"").trim()).filter(Boolean));
      const sel = $("paperFilter");
      const cur = sel.value;
      sel.innerHTML = `<option value="all">All Papers</option>` + [...set].sort().map(p=>`<option value="${p}">${p}</option>`).join("");
      if ([...set,"all"].includes(cur)) sel.value = cur;

      const grouped = groupTopicWise(rows);
      const filtered = applyFilters(grouped);
      render(filtered);

      $("status").textContent = "Updated: " + new Date().toLocaleString();
    }catch(e){
      $("status").textContent = "Error: " + e.message;
      $("out").innerHTML = "<p>Failed to load data. Check sheet sharing and Sheet name.</p>";
    }
  }

  $("refresh").addEventListener("click", load);
  $("q").addEventListener("input", load);
  $("paperFilter").addEventListener("change", load);
  $("doneFilter").addEventListener("change", load);

  load();
</script>
</body>
</html>
