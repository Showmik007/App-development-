<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Video Player</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root{
      --bg:#000;
      --panel:#0f1730;
      --text:#ffffff;
      --muted:#b7c1df;
      --border:rgba(255,255,255,.12);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      min-height:58px;
    }

    .backBtn{
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
    }

    .backBtn:hover{
      background:rgba(255,255,255,.08);
    }

    .title{
      font-size:16px;
      font-weight:700;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .video-wrap{
      flex:1;
      width:100%;
      background:#000;
      position:relative;
    }

    .video-wrap iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
    }

    .error{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      color:var(--muted);
      font-size:18px;
      line-height:1.5;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <button class="backBtn" onclick="goBack()">← Back</button>
    <div class="title" id="pageTitle">Loading video...</div>
  </div>

  <div class="video-wrap" id="videoWrap"></div>

  <script>
    function getParam(name){
      return new URLSearchParams(location.search).get(name) || "";
    }

    function cleanId(id){
      return String(id || "").trim();
    }

    function isValidYoutubeId(id){
      return /^[A-Za-z0-9_-]{6,}$/.test(id);
    }

    function goBack(){
      if(document.referrer && history.length > 1){
        history.back();
      }else{
        location.href = "feature1.html";
      }
    }

    const id = cleanId(getParam("id"));
    const title = decodeURIComponent(getParam("title") || "Tutorial Video");

    document.getElementById("pageTitle").textContent = title || "Tutorial Video";

    const wrap = document.getElementById("videoWrap");

    if(!id || !isValidYoutubeId(id)){
      wrap.innerHTML = '<div class="error">Invalid or missing YouTube video ID.</div>';
    }else{
      const embedUrl =
        "https://www.youtube.com/embed/" + encodeURIComponent(id) +
        "?autoplay=1&rel=0&modestbranding=1";

      wrap.innerHTML = `
        <iframe
          src="${embedUrl}"
          title="${escapeHtml(title || "YouTube video player")}"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
      `;
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
  </script>

</body>
</html>
