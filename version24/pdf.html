<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>PDF Viewer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="pdf-reader-body pdf-ui-visible pdf-continuous-body">
<button class="pdf-floating-toggle" id="toolbarToggle" type="button" aria-label="Hide or show PDF controls">☰</button>

<div class="pdf-nav-bar pdf-nav-modern pdf-nav-scroll" id="pdfNavBar">
  <div class="pdf-nav-left pdf-nav-left-wrap">
    <button class="pdf-reader-back" id="backBtn" type="button">Back</button>
    <div class="pdf-title-pill" id="titlePill">PDF Viewer</div>
    <div class="pdf-page-live-pill" id="pageLivePill">Page 1 / 1</div>
  </div>

  <div class="pdf-nav-group pdf-nav-group-modern pdf-scroll-toolbar" id="pageNavGroup">
    <button class="pdf-nav-btn" id="zoomOutBtn" type="button">−</button>
    <div class="pdf-zoom-pill" id="zoomText">Fit</div>
    <button class="pdf-nav-btn" id="zoomInBtn" type="button">+</button>
    <button class="pdf-nav-btn" id="fitBtn" type="button">Fit</button>

    <div class="pdf-divider" aria-hidden="true"></div>

    <button class="pdf-nav-btn is-tool active" data-tool="pan" id="toolPanBtn" type="button">View</button>
    <button class="pdf-nav-btn is-tool" data-tool="pen" id="toolPenBtn" type="button">Pen</button>
    <button class="pdf-nav-btn is-tool" data-tool="highlight" id="toolHighlightBtn" type="button">Highlight</button>
    <button class="pdf-nav-btn is-tool" data-tool="eraser" id="toolEraserBtn" type="button">Eraser</button>
    <button class="pdf-nav-btn" id="clearMarksBtn" type="button">Clear page</button>

    <div class="pdf-divider" aria-hidden="true"></div>

    <button class="pdf-nav-btn" id="openBtn" type="button">Open</button>
    <button class="pdf-nav-btn pdf-download-btn" id="downloadBtn" type="button">Download</button>
  </div>
</div>

<div class="pdf-reader-shell pdf-reader-shell-modern pdf-scroll-shell" id="viewerShell">
  <div class="pdf-reader-status" id="statusText">Loading PDF…</div>

  <div class="pdf-scroll-wrap" id="scrollWrap">
    <div class="pdf-pages-stack" id="pagesStack"></div>
  </div>

  <div class="pdf-embed-wrap pdf-embed-wrap-modern" id="embedWrap" hidden>
    <div class="pdf-embed-actions">
      <button class="pdf-nav-btn" id="embedOpenBtn" type="button">Open original</button>
      <button class="pdf-nav-btn pdf-download-btn" id="embedDownloadBtn" type="button">Download</button>
    </div>
    <iframe id="embedFrame" class="pdf-embed-frame" title="PDF preview" loading="eager" referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const title = decodeURIComponent(params.get('title') || 'PDF Note');
  const rawPdfUrl = decodeURIComponent(params.get('file') || params.get('url') || '');

  document.title = title || ((APP.cfg.PAGE_TITLES && APP.cfg.PAGE_TITLES.PDF_VIEWER) || 'PDF Viewer');

  const statusEl = document.getElementById('statusText');
  const backBtn = document.getElementById('backBtn');
  const toolbarToggle = document.getElementById('toolbarToggle');
  const titlePill = document.getElementById('titlePill');
  const pageLivePill = document.getElementById('pageLivePill');
  const zoomInBtn = document.getElementById('zoomInBtn');
  const zoomOutBtn = document.getElementById('zoomOutBtn');
  const fitBtn = document.getElementById('fitBtn');
  const zoomText = document.getElementById('zoomText');
  const openBtn = document.getElementById('openBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const clearMarksBtn = document.getElementById('clearMarksBtn');
  const embedWrap = document.getElementById('embedWrap');
  const embedFrame = document.getElementById('embedFrame');
  const embedOpenBtn = document.getElementById('embedOpenBtn');
  const embedDownloadBtn = document.getElementById('embedDownloadBtn');
  const pagesStack = document.getElementById('pagesStack');
  const viewerShell = document.getElementById('viewerShell');
  const scrollWrap = document.getElementById('scrollWrap');
  const toolButtons = Array.from(document.querySelectorAll('[data-tool]'));

  titlePill.textContent = title || 'PDF Viewer';

  let pdfDoc = null;
  let pageStates = [];
  let currentPage = 1;
  let zoomMode = 'fit';
  let zoomScale = 1;
  let renderToken = 0;
  let controlsHideTimer = null;
  let activeTool = 'pan';
  let currentPointer = null;
  let currentOverlay = null;
  let observer = null;

  const DRAW_KEY_PREFIX = 'PDF_MARKS_V22_';

  backBtn.addEventListener('click', function(){
    try { parent.postMessage({ type: 'navigate', file: APP.cfg.PAGES.PDFS }, '*'); }
    catch (err) { if(document.referrer && history.length > 1) history.back(); else location.href = APP.cfg.PAGES.PDFS; }
  });

  function setStatus(msg, isError){
    statusEl.textContent = msg;
    statusEl.classList.toggle('error', !!isError);
  }

  function getDriveFileId(input){
    const raw = String(input || '').trim();
    if(!raw) return '';
    const fileMatch = raw.match(/\/file\/d\/([^\/?#]+)/i);
    if(fileMatch) return fileMatch[1];
    try {
      const u = new URL(raw);
      if(u.hostname.includes('drive.google.com')) return u.searchParams.get('id') || '';
    } catch (err) {}
    return '';
  }

  function buildPdfJsUrl(input){
    const raw = String(input || '').trim();
    if(!raw) return '';
    const driveId = getDriveFileId(raw);
    if(driveId) return 'https://drive.google.com/uc?export=download&id=' + encodeURIComponent(driveId);
    return raw;
  }

  function buildOpenUrl(input){
    const raw = String(input || '').trim();
    const driveId = getDriveFileId(raw);
    if(driveId) return 'https://drive.google.com/file/d/' + encodeURIComponent(driveId) + '/view';
    return raw;
  }

  function buildDownloadUrl(input){
    const raw = String(input || '').trim();
    const driveId = getDriveFileId(raw);
    if(driveId) return 'https://drive.google.com/uc?export=download&id=' + encodeURIComponent(driveId);
    return raw;
  }

  function buildEmbedUrl(input){
    const raw = String(input || '').trim();
    const driveId = getDriveFileId(raw);
    if(driveId) return 'https://drive.google.com/file/d/' + encodeURIComponent(driveId) + '/preview';
    return 'https://docs.google.com/gview?embedded=1&url=' + encodeURIComponent(raw);
  }

  function fileKey(){
    return DRAW_KEY_PREFIX + btoa(unescape(encodeURIComponent(rawPdfUrl || title || 'pdf'))).replace(/=+$/,'');
  }

  function pageMarkKey(pageNumber){
    return fileKey() + '_page_' + String(pageNumber);
  }

  function setControlsVisible(show, autoHide){
    document.body.classList.toggle('pdf-ui-visible', !!show);
    if(controlsHideTimer) clearTimeout(controlsHideTimer);
    if(show && autoHide && window.innerWidth <= 760 && !embedWrap.hidden){
      return;
    }
    if(show && autoHide && window.innerWidth <= 760){
      controlsHideTimer = setTimeout(function(){
        document.body.classList.remove('pdf-ui-visible');
      }, 2200);
    }
  }

  function nudgeControls(){
    setControlsVisible(true, true);
  }

  toolbarToggle.addEventListener('click', function(e){
    e.stopPropagation();
    setControlsVisible(!document.body.classList.contains('pdf-ui-visible'), false);
  });
  viewerShell.addEventListener('touchstart', function(){ nudgeControls(); }, { passive:true });
  viewerShell.addEventListener('mousemove', function(){ if(window.innerWidth > 760) setControlsVisible(true, false); });

  function updateToolButtons(){
    toolButtons.forEach(function(btn){ btn.classList.toggle('active', btn.dataset.tool === activeTool); });
    document.body.classList.toggle('pdf-draw-mode', activeTool !== 'pan');
    pageStates.forEach(function(state){
      if(!state || !state.overlay) return;
      state.overlay.style.pointerEvents = activeTool === 'pan' ? 'none' : 'auto';
    });
  }

  toolButtons.forEach(function(btn){
    btn.addEventListener('click', function(){
      activeTool = btn.dataset.tool || 'pan';
      updateToolButtons();
      nudgeControls();
    });
  });

  function updateZoomLabel(){
    zoomText.textContent = zoomMode === 'fit' ? 'Fit' : Math.round(zoomScale * 100) + '%';
  }

  function pageWidthBase(){
    const sidePadding = window.innerWidth <= 760 ? 10 : 34;
    return Math.max(240, Math.min(scrollWrap.clientWidth - sidePadding, 1180));
  }

  function getRenderScale(page){
    const viewport = page.getViewport({ scale: 1 });
    const fit = pageWidthBase() / viewport.width;
    return zoomMode === 'fit' ? Math.max(0.4, Math.min(fit, 2.4)) : Math.max(0.5, Math.min(zoomScale, 3.2));
  }

  function updatePageLive(){
    const total = pdfDoc ? pdfDoc.numPages : 1;
    pageLivePill.textContent = 'Page ' + currentPage + ' / ' + total;
  }

  function openExternal(url){
    const target = url || buildOpenUrl(rawPdfUrl);
    try {
      const win = window.open(target, '_blank', 'noopener');
      if(!win) location.href = target;
    } catch (err) {
      location.href = target;
    }
  }

  async function triggerDownload(){
    const directUrl = buildDownloadUrl(rawPdfUrl);
    const name = (title || 'document').replace(/[\\/:*?"<>|]+/g, ' ').trim() || 'document';
    const filename = /\.pdf$/i.test(name) ? name : (name + '.pdf');
    try {
      const res = await fetch(directUrl, { credentials:'omit' });
      if(!res.ok) throw new Error('Fetch failed');
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(function(){ URL.revokeObjectURL(blobUrl); }, 2000);
      return;
    } catch (err) {}

    try {
      const a = document.createElement('a');
      a.href = directUrl;
      a.target = '_blank';
      a.rel = 'noopener';
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
    } catch (err) {
      openExternal(directUrl);
    }
  }

  openBtn.addEventListener('click', function(){ openExternal(buildOpenUrl(rawPdfUrl)); });
  downloadBtn.addEventListener('click', triggerDownload);
  embedOpenBtn.addEventListener('click', function(){ openExternal(buildOpenUrl(rawPdfUrl)); });
  embedDownloadBtn.addEventListener('click', triggerDownload);

  function showEmbedMode(message){
    pagesStack.innerHTML = '';
    scrollWrap.hidden = true;
    embedWrap.hidden = false;
    embedFrame.src = buildEmbedUrl(rawPdfUrl);
    setStatus(message || 'Preview mode enabled', false);
    setControlsVisible(true, false);
  }

  function saveOverlay(state){
    try {
      const hasInk = !!state.overlay.dataset.hasInk;
      if(!hasInk){
        localStorage.removeItem(pageMarkKey(state.pageNumber));
        return;
      }
      localStorage.setItem(pageMarkKey(state.pageNumber), state.overlay.toDataURL('image/png'));
    } catch (err) {}
  }

  function clearOverlayCanvas(state, shouldSave){
    if(!state || !state.overlay || !state.overlayCtx) return;
    state.overlayCtx.clearRect(0, 0, state.overlay.width, state.overlay.height);
    delete state.overlay.dataset.hasInk;
    if(shouldSave !== false) saveOverlay(state);
  }

  function restoreOverlay(state){
    try {
      const stored = localStorage.getItem(pageMarkKey(state.pageNumber));
      if(!stored) return;
      const img = new Image();
      img.onload = function(){
        state.overlayCtx.clearRect(0, 0, state.overlay.width, state.overlay.height);
        state.overlayCtx.drawImage(img, 0, 0, state.overlay.width, state.overlay.height);
        state.overlay.dataset.hasInk = '1';
      };
      img.src = stored;
    } catch (err) {}
  }

  function setOverlaySize(state, cssWidth, cssHeight){
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    state.overlay.width = Math.floor(cssWidth * ratio);
    state.overlay.height = Math.floor(cssHeight * ratio);
    state.overlay.style.width = Math.floor(cssWidth) + 'px';
    state.overlay.style.height = Math.floor(cssHeight) + 'px';
    state.overlayCtx.setTransform(1, 0, 0, 1, 0, 0);
    state.overlayCtx.scale(ratio, ratio);
    state.overlayScale = ratio;
    clearOverlayCanvas(state, false);
    restoreOverlay(state);
  }

  function getPointFromEvent(state, ev){
    const rect = state.overlay.getBoundingClientRect();
    const point = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
    return {
      x: point.clientX - rect.left,
      y: point.clientY - rect.top
    };
  }

  function beginStroke(state, point){
    const ctx = state.overlayCtx;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalCompositeOperation = activeTool === 'eraser' ? 'destination-out' : 'source-over';
    if(activeTool === 'highlight'){
      ctx.strokeStyle = 'rgba(255, 235, 59, 0.35)';
      ctx.lineWidth = Math.max(16, state.cssWidth * 0.022);
    } else if(activeTool === 'eraser'){
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.lineWidth = Math.max(18, state.cssWidth * 0.025);
    } else {
      ctx.strokeStyle = '#ff4d62';
      ctx.lineWidth = Math.max(2.5, state.cssWidth * 0.0045);
    }
    ctx.beginPath();
    ctx.moveTo(point.x, point.y);
    state.lastPoint = point;
    state.overlay.dataset.hasInk = '1';
  }

  function drawStroke(state, point){
    const ctx = state.overlayCtx;
    if(!state.lastPoint) return;
    ctx.lineTo(point.x, point.y);
    ctx.stroke();
    state.lastPoint = point;
  }

  function endStroke(state){
    if(!state) return;
    state.lastPoint = null;
    saveOverlay(state);
  }

  function bindOverlayEvents(state){
    function onPointerDown(ev){
      if(activeTool === 'pan') return;
      ev.preventDefault();
      nudgeControls();
      currentPointer = state.pageNumber;
      currentOverlay = state;
      const point = getPointFromEvent(state, ev);
      beginStroke(state, point);
    }
    function onPointerMove(ev){
      if(currentPointer !== state.pageNumber || !currentOverlay || activeTool === 'pan') return;
      ev.preventDefault();
      const point = getPointFromEvent(state, ev);
      drawStroke(state, point);
    }
    function onPointerUp(){
      if(currentPointer !== state.pageNumber) return;
      endStroke(state);
      currentPointer = null;
      currentOverlay = null;
    }
    state.overlay.addEventListener('mousedown', onPointerDown);
    state.overlay.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    state.overlay.addEventListener('touchstart', onPointerDown, { passive:false });
    state.overlay.addEventListener('touchmove', onPointerMove, { passive:false });
    window.addEventListener('touchend', onPointerUp, { passive:true });
    window.addEventListener('touchcancel', onPointerUp, { passive:true });
  }

  function scrollToPage(pageNumber){
    const state = pageStates[pageNumber - 1];
    if(!state || !state.card) return;
    state.card.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  document.addEventListener('keydown', function(e){
    const key = String(e.key || '').toLowerCase();
    nudgeControls();
    if((e.ctrlKey || e.metaKey) && key === '0'){
      e.preventDefault();
      zoomMode = 'fit';
      renderAllPages();
      return;
    }
    if((e.ctrlKey || e.metaKey) && (key === '+' || key === '=')){
      e.preventDefault();
      zoomMode = 'custom';
      zoomScale = Math.min(3.2, (zoomMode === 'fit' ? 1 : zoomScale) + 0.15);
      renderAllPages();
      return;
    }
    if((e.ctrlKey || e.metaKey) && key === '-'){
      e.preventDefault();
      zoomMode = 'custom';
      zoomScale = Math.max(0.5, (zoomMode === 'fit' ? 1 : zoomScale) - 0.15);
      renderAllPages();
      return;
    }
    if(key === 'pagedown' || key === 'arrowright'){ scrollToPage(Math.min((pdfDoc ? pdfDoc.numPages : 1), currentPage + 1)); }
    if(key === 'pageup' || key === 'arrowleft'){ scrollToPage(Math.max(1, currentPage - 1)); }
  });

  zoomInBtn.addEventListener('click', function(){ zoomMode = 'custom'; zoomScale = Math.min(3.2, (zoomMode === 'fit' ? 1 : zoomScale) + 0.15); renderAllPages(); });
  zoomOutBtn.addEventListener('click', function(){ zoomMode = 'custom'; zoomScale = Math.max(0.5, (zoomMode === 'fit' ? 1 : zoomScale) - 0.15); renderAllPages(); });
  fitBtn.addEventListener('click', function(){ zoomMode = 'fit'; renderAllPages(); });
  clearMarksBtn.addEventListener('click', function(){
    const state = pageStates[currentPage - 1];
    if(!state) return;
    clearOverlayCanvas(state, true);
    nudgeControls();
  });

  function setupObserver(){
    if(observer) observer.disconnect();
    observer = new IntersectionObserver(function(entries){
      let best = null;
      entries.forEach(function(entry){
        if(!entry.isIntersecting) return;
        if(!best || entry.intersectionRatio > best.intersectionRatio) best = entry;
      });
      if(best){
        currentPage = Number(best.target.dataset.page || 1);
        updatePageLive();
      }
    }, { root:null, threshold:[0.25, 0.5, 0.75] });

    pageStates.forEach(function(state){ if(state && state.card) observer.observe(state.card); });
  }

  async function renderAllPages(){
    if(!pdfDoc) return;
    const token = ++renderToken;
    setStatus('Rendering pages…', false);
    updateZoomLabel();
    pagesStack.innerHTML = '';
    pageStates = [];

    for(let pageNumber = 1; pageNumber <= pdfDoc.numPages; pageNumber += 1){
      if(token !== renderToken) return;
      const page = await pdfDoc.getPage(pageNumber);
      const scale = getRenderScale(page);
      const viewport = page.getViewport({ scale: scale });
      const ratio = Math.max(window.devicePixelRatio || 1, 1);

      const card = document.createElement('section');
      card.className = 'pdf-page-card';
      card.dataset.page = String(pageNumber);

      const meta = document.createElement('div');
      meta.className = 'pdf-page-meta';
      meta.innerHTML = '<span class="badge">Page ' + pageNumber + '</span>';

      const stage = document.createElement('div');
      stage.className = 'pdf-page-stage';

      const canvas = document.createElement('canvas');
      canvas.className = 'pdf-page-canvas continuous';
      canvas.width = Math.floor(viewport.width * ratio);
      canvas.height = Math.floor(viewport.height * ratio);
      canvas.style.width = Math.floor(viewport.width) + 'px';
      canvas.style.height = Math.floor(viewport.height) + 'px';

      const overlay = document.createElement('canvas');
      overlay.className = 'pdf-mark-layer';
      overlay.setAttribute('aria-label', 'Annotation layer for page ' + pageNumber);

      stage.appendChild(canvas);
      stage.appendChild(overlay);
      card.appendChild(meta);
      card.appendChild(stage);
      pagesStack.appendChild(card);

      const ctx = canvas.getContext('2d', { alpha:false });
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(ratio, ratio);
      await page.render({ canvasContext: ctx, viewport: viewport }).promise;

      const overlayCtx = overlay.getContext('2d');
      const state = {
        pageNumber,
        card,
        stage,
        canvas,
        overlay,
        overlayCtx,
        cssWidth: viewport.width,
        cssHeight: viewport.height,
        scale,
        ratio
      };
      setOverlaySize(state, viewport.width, viewport.height);
      bindOverlayEvents(state);
      pageStates.push(state);
    }

    embedWrap.hidden = true;
    scrollWrap.hidden = false;
    updateToolButtons();
    setupObserver();
    currentPage = Math.min(currentPage, pdfDoc.numPages);
    updatePageLive();
    setStatus(title + ' • ' + pdfDoc.numPages + ' pages', false);
  }

  if(!rawPdfUrl){
    setStatus('Missing PDF file link', true);
    return;
  }

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  async function loadPdf(){
    const pdfUrl = buildPdfJsUrl(rawPdfUrl);
    try {
      setStatus('Loading PDF…', false);
      pdfDoc = await pdfjsLib.getDocument({ url: pdfUrl, withCredentials:false }).promise;
      updateZoomLabel();
      await renderAllPages();
    } catch (err) {
      console.error(err);
      showEmbedMode('Preview mode opened because the PDF file blocked direct rendering');
    }
  }

  let resizeTimer = null;
  window.addEventListener('resize', function(){
    if(!pdfDoc || !embedWrap.hidden) return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){ renderAllPages(); }, 180);
  });

  scrollWrap.addEventListener('scroll', function(){ nudgeControls(); }, { passive:true });
  setControlsVisible(true, true);
  loadPdf();
})();
</script>
</body>
</html>
