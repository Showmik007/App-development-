<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Tutorial Videos</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --panel2:#0f1730;
      --text:#eaf0ff;
      --muted:#a7b2d6;
      --border:rgba(255,255,255,.12);
      --blue:#3b82f6;
      --cyan:#22d3ee;
      --red:#ef4444;
      --shadow:0 18px 45px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:14px;
    }

    .top{
      position:sticky;
      top:0;
      z-index:10;
      background:var(--bg);
      padding-bottom:12px;
    }

    h1{
      margin:0 0 12px;
      font-size:28px;
    }

    .controls{
      display:grid;
      grid-template-columns: 1fr 220px;
      gap:12px;
      margin-bottom:10px;
    }

    @media (max-width:700px){
      .controls{grid-template-columns:1fr}
    }

    input,select,button{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel2);
      color:var(--text);
      font-size:14px;
      outline:none;
    }

    .status{
      color:var(--muted);
      font-size:12px;
      margin-bottom:10px;
    }

    .list{
      display:grid;
      gap:14px;
    }

    .card{
      display:grid;
      grid-template-columns: 160px 1fr auto;
      gap:16px;
      align-items:center;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      cursor:pointer;
      transition:.18s ease;
      box-shadow: var(--shadow);
    }

    .card:hover{
      transform:translateY(-1px);
      background:#152243;
    }

    @media (max-width:700px){
      .card{grid-template-columns:1fr}
    }

    .thumbWrap{
      position:relative;
      width:160px;
      height:90px;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--border);
      background:#0a1020;
      flex-shrink:0;
    }

    .thumb{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .thumbFallback{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:13px;
    }

    .playIcon{
      position:absolute;
      left:8px;
      bottom:8px;
      background:rgba(0,0,0,.55);
      color:#fff;
      border:1px solid rgba(255,255,255,.15);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      backdrop-filter: blur(4px);
    }

    @media (max-width:700px){
      .thumbWrap{
        width:100%;
        height:190px;
      }
    }

    .title{
      font-size:20px;
      font-weight:900;
      margin:0 0 6px;
    }

    .desc{
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
      margin:0;
    }

    .meta{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      align-self:start;
    }

    .empty{
      margin-top:16px;
      padding:18px;
      border:1px dashed var(--border);
      border-radius:16px;
      color:var(--muted);
      text-align:center;
      background:var(--panel);
    }

    /* Modal */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.78);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
      padding:14px;
    }

    .overlay.open{
      display:flex;
    }

    .modal{
      width:min(1100px, 100%);
      max-height:100%;
      background:#05070d;
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      box-shadow: var(--shadow);
    }

    .modalHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      background:#0d1322;
      border-bottom:1px solid var(--border);
    }

    .modalTitle{
      font-weight:900;
      font-size:15px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .modalBtns{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .smallBtn{
      width:auto;
      padding:10px 12px;
      background:#10192f;
      cursor:pointer;
      font-weight:800;
    }

    .videoWrap{
      position:relative;
      width:100%;
      aspect-ratio:16 / 9;
      background:#000;
    }

    .videoFrame{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }

    .help{
      padding:10px 12px 12px;
      color:var(--muted);
      font-size:12px;
      background:#0d1322;
      line-height:1.45;
    }

    .warn{
      color:#ffb4b4;
      margin-top:6px;
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>Tutorial Videos</h1>
    <div class="controls">
      <input id="search" placeholder="Search by title or description" />
      <select id="sort">
        <option value="serial-asc">Sort: Serial ↑</option>
        <option value="serial-desc">Sort: Serial ↓</option>
        <option value="title-asc">Sort: Title A-Z</option>
        <option value="title-desc">Sort: Title Z-A</option>
      </select>
    </div>
    <div class="status" id="status">Loading…</div>
  </div>

  <div class="list" id="list"></div>

  <!-- Video popup -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modalHead">
        <div class="modalTitle" id="modalTitle">Video</div>
        <div class="modalBtns">
          <button class="smallBtn" id="fullBtn" type="button">Full Screen</button>
          <button class="smallBtn" id="openYoutubeBtn" type="button">Open in YouTube</button>
          <button class="smallBtn" id="closeBtn" type="button">Close</button>
        </div>
      </div>

      <div class="videoWrap" id="videoWrap">
        <iframe
          id="player"
          class="videoFrame"
          title="YouTube video player"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
      </div>

      <div class="help">
        If the popup stays black, tap <b>Open in YouTube</b>. Some app builders or browsers block embedded YouTube playback.
        <div class="warn" id="warnText"></div>
      </div>
    </div>
  </div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbwSH8UmHBBvRY8pK8PdWzGsP-BsQfc3hqgPkGwVFoTB0oIyFbLeqA9LWyOSd8iVJtO9/exec";
  const TOKEN = localStorage.getItem("USER_TOKEN") || "";
  let ALL = [];
  let currentRawUrl = "";

  function val(obj, key){
    return obj && obj[key] !== undefined && obj[key] !== null ? String(obj[key]).trim() : "";
  }

  function getYouTubeId(url){
    url = String(url || "").trim();
    if(!url) return "";

    try{
      const u = new URL(url);

      if(u.hostname.includes("youtu.be")){
        return u.pathname.replace(/^\/+/,"").split("/")[0];
      }

      if(u.hostname.includes("youtube.com")){
        if(u.pathname === "/watch") return u.searchParams.get("v") || "";
        if(u.pathname.startsWith("/embed/")) return u.pathname.split("/")[2] || "";
        if(u.pathname.startsWith("/shorts/")) return u.pathname.split("/")[2] || "";
      }
    }catch(e){}
    return "";
  }

  function getThumb(url){
    const id = getYouTubeId(url);
    return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : "";
  }

  function getEmbedUrl(url){
    const id = getYouTubeId(url);
    if(id){
      return `https://www.youtube.com/embed/${encodeURIComponent(id)}?autoplay=1&playsinline=1&rel=0&modestbranding=1`;
    }
    return String(url || "").trim();
  }

  function normalizeRow(r){
    return {
      serial: val(r, "serial number"),
      title: val(r, "title"),
      description: val(r, "Description"),
      videoLink: val(r, "vedio link"),
      thumb: getThumb(val(r, "vedio link")),
      embedUrl: getEmbedUrl(val(r, "vedio link"))
    };
  }

  async function load(){
    const status = document.getElementById("status");
    const list = document.getElementById("list");

    try{
      const res = await fetch(API + "?action=tutorial_list&token=" + encodeURIComponent(TOKEN), { cache:"no-store" });
      const data = await res.json();

      if(!data.ok) throw new Error(data.error || "Failed to load tutorials");

      ALL = (data.rows || []).map(normalizeRow).filter(r => r.title || r.videoLink);
      status.textContent = `Loaded ${ALL.length} video${ALL.length === 1 ? "" : "s"}`;
      render();
    }catch(e){
      status.textContent = "Error: " + e.message;
      list.innerHTML = `<div class="empty">Could not load videos.</div>`;
    }
  }

  function render(){
    const q = document.getElementById("search").value.trim().toLowerCase();
    const sort = document.getElementById("sort").value;
    const list = document.getElementById("list");
    const status = document.getElementById("status");

    let rows = ALL.filter(r => {
      const hay = `${r.title} ${r.description}`.toLowerCase();
      return !q || hay.includes(q);
    });

    rows.sort((a,b)=>{
      if(sort === "serial-asc") return (parseInt(a.serial || "0",10) || 0) - (parseInt(b.serial || "0",10) || 0);
      if(sort === "serial-desc") return (parseInt(b.serial || "0",10) || 0) - (parseInt(a.serial || "0",10) || 0);
      if(sort === "title-asc") return a.title.localeCompare(b.title);
      if(sort === "title-desc") return b.title.localeCompare(a.title);
      return 0;
    });

    status.textContent = `${rows.length} result${rows.length === 1 ? "" : "s"}`;

    if(!rows.length){
      list.innerHTML = `<div class="empty">No videos found.</div>`;
      return;
    }

    list.innerHTML = rows.map(r => `
      <div class="card"
           data-embed="${encodeURIComponent(r.embedUrl)}"
           data-raw="${encodeURIComponent(r.videoLink)}"
           data-title="${encodeURIComponent(r.title)}">
        <div class="thumbWrap">
          ${r.thumb
            ? `<img class="thumb" src="${r.thumb}" alt="" onerror="this.outerHTML='<div class=&quot;thumbFallback&quot;>No thumbnail</div>'">`
            : `<div class="thumbFallback">No thumbnail</div>`}
          <div class="playIcon">▶ Play</div>
        </div>
        <div>
          <div class="title">${escapeHtml(r.title || "Untitled Video")}</div>
          <p class="desc">${escapeHtml(r.description || "")}</p>
        </div>
        <div class="meta">#${escapeHtml(r.serial || "-")}</div>
      </div>
    `).join("");

    document.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", ()=>{
        const embed = decodeURIComponent(card.dataset.embed || "");
        const raw = decodeURIComponent(card.dataset.raw || "");
        const title = decodeURIComponent(card.dataset.title || "");
        openPlayer(embed, title, raw);
      });
    });
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;");
  }

  const overlay = document.getElementById("overlay");
  const player = document.getElementById("player");
  const modalTitle = document.getElementById("modalTitle");
  const closeBtn = document.getElementById("closeBtn");
  const fullBtn = document.getElementById("fullBtn");
  const openYoutubeBtn = document.getElementById("openYoutubeBtn");
  const videoWrap = document.getElementById("videoWrap");
  const warnText = document.getElementById("warnText");

  function openPlayer(src, title, rawUrl){
    currentRawUrl = rawUrl || "";
    modalTitle.textContent = title || "Video";
    warnText.textContent = "";
    player.src = src;
    overlay.classList.add("open");

    // If still black, user can use fallback
    setTimeout(()=>{
      warnText.textContent = "If nothing is playing, your app/browser may be blocking embedded YouTube.";
    }, 2500);
  }

  function closePlayer(){
    overlay.classList.remove("open");
    player.src = "";
    warnText.textContent = "";
  }

  closeBtn.addEventListener("click", closePlayer);
  overlay.addEventListener("click", (e)=>{
    if(e.target === overlay) closePlayer();
  });

  fullBtn.addEventListener("click", async ()=>{
    try{
      if(videoWrap.requestFullscreen) await videoWrap.requestFullscreen();
      else if(player.requestFullscreen) await player.requestFullscreen();
    }catch(e){}
  });

  openYoutubeBtn.addEventListener("click", ()=>{
    if(currentRawUrl){
      window.open(currentRawUrl, "_blank");
    }
  });

  document.getElementById("search").addEventListener("input", render);
  document.getElementById("sort").addEventListener("change", render);

  load();
</script>
</body>
</html>
